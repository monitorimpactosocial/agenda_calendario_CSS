<script>
/* ================================================================
   PARACEL · Gestor Colaborativo v3 — Scripts
   Lógica de cliente completamente refactorizada:
   - Estado reactivo centralizado
   - Modo oscuro persistente
   - Vista de actividad nueva
   - Línea de hoy en Gantt
   - Vista compacta/expandida en cronograma
   - Chips de etiquetas renderizados
   - Indicadores de progreso animados (KPI rings)
   - Carga progresiva con esqueletos
   ================================================================ */

/* ── Utilidades de almacenamiento ── */
const store = {
  get: k => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch {} },
  del: k => { try { localStorage.removeItem(k); } catch {} }
};

/* ── Estado global ── */
const state = {
  token:     store.get('paracel_token') || '',
  app:       null,
  tab:       'dashboard',
  dark:      store.get('paracel_dark') === '1',
  ganttMode: store.get('paracel_gantt_mode') || 'normal', // 'normal' | 'compact'
  filters:   { project:'', status:'', priority:'', search:'' },
  calendar:  { month: new Date().getMonth(), year: new Date().getFullYear() }
};

/* ── Helpers DOM ── */
const qs   = id => document.getElementById(id);
const qsa  = sel => document.querySelectorAll(sel);

function escHtml(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Dark mode ── */
function applyDark() {
  document.documentElement.classList.toggle('dark', state.dark);
  const btn = qs('dark-toggle');
  if (btn) btn.textContent = state.dark ? '☀️' : '🌙';
}

/* ── Toast ── */
function toast(msg, err = false) {
  const el = qs('toast');
  el.className = `toast ${err ? 'err' : 'ok'}`;
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.add('hidden'), 3400);
}

/* ── Modal ── */
const openModal  = id => qs(id).classList.remove('hidden');
const closeModal = id => qs(id).classList.add('hidden');

/* ── API bridge ── */
function api(fn, ...args) {
  return new Promise((res, rej) => {
    google.script.run
      .withSuccessHandler(res)
      .withFailureHandler(e => rej(new Error(e?.message || String(e))))
      [fn](...args);
  });
}

/* ── Date helpers ── */
const todayIso = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const localKey = d =>
  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const daysBetween = (a, b) => {
  if (!a || !b) return null;
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
};
const fmtDate = iso => {
  if (!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('es-PY', { day:'2-digit', month:'2-digit', year:'numeric' });
};
const normalClass = t => String(t||'').replace(/\s+/g,'-');

/* ── Data helpers ── */
const filtered = () => {
  if (!state.app) return [];
  const { project, status, priority, search } = state.filters;
  return state.app.tasks.filter(t => {
    if (project  && t.project_id !== project) return false;
    if (status   && t.status !== status) return false;
    if (priority && t.priority !== priority) return false;
    if (search) {
      const n = search.toLowerCase();
      const h = [t.title, t.description, t.assignee_name, t.tags, t.task_id].join(' ').toLowerCase();
      if (!h.includes(n)) return false;
    }
    return true;
  });
};
const projName  = id => (state.app.projects.find(p => p.project_id === id) || {}).project_name || id;
const projColor = id => (state.app.projects.find(p => p.project_id === id) || {}).color || '#0f3d1d';
const userName  = (id, fb='') => (state.app.users.find(u => u.user_id === id) || {}).display_name || fb;

/* ── Tooltip ── */
function tooltipHtml(t) {
  const prog = Number(t.progress || 0);
  const days = t.days_to_due;
  const daysTxt = days === null ? '' : days < 0
    ? `⚠️ Atrasada ${Math.abs(days)}d`
    : days === 0 ? '🔴 Vence hoy' : `⏳ ${days}d restantes`;
  const tags = (t.tags || '').split(',').map(x=>x.trim()).filter(Boolean)
    .map(x=>`<span class="tag">${escHtml(x)}</span>`).join('');
  const prog_class = prog >= 80 ? 'green' : prog >= 40 ? 'blue' : 'amber';

  return `
    <div class="tooltip-title">${escHtml(t.title)}</div>
    <div class="tooltip-row"><span class="tooltip-label">Tipo</span><span class="tooltip-val">${escHtml(t.type)}</span></div>
    <div class="tooltip-row"><span class="tooltip-label">Proyecto</span><span class="tooltip-val">${escHtml(projName(t.project_id))}</span></div>
    <div class="tooltip-row"><span class="tooltip-label">Estado</span><span class="tooltip-val">${escHtml(t.status)}</span></div>
    <div class="tooltip-row"><span class="tooltip-label">Prioridad</span><span class="tooltip-val">${escHtml(t.priority)}</span></div>
    <div class="tooltip-row"><span class="tooltip-label">Inicio</span><span class="tooltip-val">${escHtml(t.start_date||'—')}</span></div>
    <div class="tooltip-row"><span class="tooltip-label">Fin</span><span class="tooltip-val">${escHtml(t.due_date||'—')}${daysTxt ? ' · '+daysTxt : ''}</span></div>
    <div class="tooltip-row"><span class="tooltip-label">Resp.</span><span class="tooltip-val">${escHtml(t.assignee_name || userName(t.assignee_user_id) || 'Sin asignar')}</span></div>
    <div class="tooltip-row"><span class="tooltip-label">Avance</span><span class="tooltip-val">${prog}%</span></div>
    <div class="tooltip-prog"><div class="tooltip-prog-fill" style="width:${prog}%"></div></div>
    ${t.estimated_hours ? `<div class="tooltip-row"><span class="tooltip-label">Horas</span><span class="tooltip-val">${escHtml(String(t.actual_hours||0))}h / ${escHtml(String(t.estimated_hours))}h est.</span></div>` : ''}
    ${t.work_path ? `<div class="tooltip-row"><span class="tooltip-label">Ruta</span><span class="tooltip-val" style="font-size:11px;opacity:.9">${escHtml(t.work_path)}</span></div>` : ''}
    ${t.folder_url ? `<div class="tooltip-row"><span class="tooltip-label">Drive</span><span class="tooltip-val"><a href="${escHtml(t.folder_url)}" target="_blank" style="color:var(--g300)">Abrir carpeta ↗</a></span></div>` : ''}
    ${tags ? `<div style="margin-top:8px">${tags}</div>` : ''}
    ${t.description ? `<div class="tooltip-desc">${escHtml(t.description).slice(0,280)}</div>` : ''}
  `;
}

function attachTooltips(sel = '[data-tt]') {
  qsa(sel).forEach(el => {
    el.onmouseenter = ev => {
      const taskId = el.getAttribute('data-tt');
      const t = state.app.tasks.find(x => x.task_id === taskId);
      if (!t) return;
      const tip = qs('tooltip');
      tip.innerHTML = tooltipHtml(t);
      tip.classList.remove('hidden');
      moveTooltip(ev);
    };
    el.onmousemove = moveTooltip;
    el.onmouseleave = () => qs('tooltip').classList.add('hidden');
  });
}
function moveTooltip(ev) {
  const tip = qs('tooltip');
  const pad = 14;
  const rect = tip.getBoundingClientRect();
  let l = ev.clientX + 18, t = ev.clientY + 18;
  if (l + rect.width + pad > window.innerWidth)  l = Math.max(pad, ev.clientX - rect.width - 18);
  if (t + rect.height + pad > window.innerHeight) t = Math.max(pad, ev.clientY - rect.height - 18);
  tip.style.left = l + 'px'; tip.style.top = t + 'px';
}

/* ── Open task links ── */
function bindOpenTask() {
  qsa('[data-open]').forEach(el => {
    el.onclick = () => openTask(el.getAttribute('data-open'));
  });
}

/* ═══════════════════════════════════════
   RENDER: FILTERS
═══════════════════════════════════════ */
function renderFilters() {
  const opts = ['<option value="">Todos</option>']
    .concat(state.app.projects.map(p =>
      `<option value="${escHtml(p.project_id)}">${escHtml(p.project_name)}</option>`));
  qs('filter-project').innerHTML = opts.join('');
  qs('filter-project').value = state.filters.project;

  // task project select
  qs('task-project').innerHTML = state.app.projects.map(p =>
    `<option value="${escHtml(p.project_id)}">${escHtml(p.project_name)}</option>`).join('');

  const users = ['<option value="">Sin asignar</option>']
    .concat(state.app.users.map(u =>
      `<option value="${escHtml(u.user_id)}">${escHtml(u.display_name)}</option>`));
  qs('task-assignee').innerHTML = users.join('');
}

/* ═══════════════════════════════════════
   RENDER: MESSAGE BAR
═══════════════════════════════════════ */
function renderMessageBar() {
  const d = state.app.dashboard;
  const badge = d.urgent > 0 ? `<span class="urgent-badge">${d.urgent}</span>` : '';
  const titles = d.top_urgent.slice(0,2).map(t => escHtml(t.title)).join(' · ');
  qs('message-bar').innerHTML = `
    ${badge}
    <span>
      <strong>${d.urgent}</strong> urgentes ·
      <strong>${d.overdue}</strong> atrasadas ·
      <strong>${d.due_today}</strong> vencen hoy ·
      <strong>${d.blocked}</strong> bloqueadas
      ${titles ? ` — ${titles}` : ''}
    </span>
  `;
}

/* ═══════════════════════════════════════
   RENDER: DASHBOARD
═══════════════════════════════════════ */
function renderDashboard() {
  const d = state.app.dashboard;
  const total = Math.max(d.tasks, 1);

  const kpis = [
    { label:'Proyectos',       val:d.projects,      sub:'En portafolio',                 pct:(d.projects/10)*100, cls:'' },
    { label:'Tareas abiertas', val:d.open_tasks,     sub:'Pendientes, en curso, bloqueadas',pct:(d.open_tasks/total)*100, cls:'' },
    { label:'Urgentes',        val:d.urgent,         sub:'Prioridad crítica o vence pronto',pct:(d.urgent/total)*100, cls:'danger' },
    { label:'Atrasadas',       val:d.overdue,        sub:'Requieren acción inmediata',    pct:(d.overdue/total)*100, cls:'danger' },
    { label:'Bloqueadas',      val:d.blocked,        sub:'Riesgos operativos activos',    pct:(d.blocked/total)*100, cls:'amber' },
    { label:'Avance promedio', val:d.avg_progress+'%',sub:'Global del portafolio',        pct:d.avg_progress, cls:'teal' }
  ];

  qs('tab-dashboard').innerHTML = `
    <div class="kpi-grid">
      ${kpis.map(k => kpiCard(k)).join('')}
    </div>
    <div class="dash-grid">
      <div class="stack">
        <div class="card">
          <div class="section-header">
            <div>
              <div class="section-title">⚡ Tareas urgentes</div>
              <div class="section-sub">Lista ejecutiva priorizada — haz clic para abrir</div>
            </div>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Tarea</th><th>Proyecto</th><th>Estado</th><th>Prioridad</th><th>Fin</th><th>Resp.</th><th>%</th></tr></thead>
              <tbody>
                ${d.top_urgent.map(t => `
                  <tr data-open="${escHtml(t.task_id)}" data-tt="${escHtml(t.task_id)}">
                    <td><span class="type-chip ${escHtml(t.type)}">${escHtml(t.type)}</span> ${escHtml(t.title)}</td>
                    <td class="muted">${escHtml(projName(t.project_id))}</td>
                    <td><span class="badge status-${normalClass(t.status)}">${escHtml(t.status)}</span></td>
                    <td><span class="badge priority-${normalClass(t.priority)}">${escHtml(t.priority)}</span></td>
                    <td class="muted" style="font-family:'DM Mono',monospace;font-size:12px">${escHtml(t.due_date||'')}</td>
                    <td class="muted">${escHtml(t.assignee_name||userName(t.assignee_user_id)||'—')}</td>
                    <td>
                      <div style="display:flex;align-items:center;gap:6px">
                        <div class="prog-wrap" style="width:56px"><div class="prog-fill green" style="width:${t.progress||0}%"></div></div>
                        <span class="muted small">${t.progress||0}%</span>
                      </div>
                    </td>
                  </tr>
                `).join('') || '<tr><td colspan="7" style="text-align:center" class="muted">Sin tareas urgentes.</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="stack">
        <div class="card">
          <div class="section-title">👤 Carga por usuario</div>
          <div class="section-sub" style="margin-bottom:12px">Tareas abiertas por responsable</div>
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Usuario</th><th>Abiertas</th><th>Urgentes</th></tr></thead>
              <tbody>${renderResponsibleRows()}</tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <div class="section-title">📂 Resumen por proyecto</div>
          <div class="section-sub" style="margin-bottom:12px">Tareas y avance medio</div>
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Proyecto</th><th>Tareas</th><th>Urgentes</th><th>Avance</th></tr></thead>
              <tbody>${renderProjectRows()}</tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;
  bindOpenTask();
  attachTooltips('[data-tt]');
}

function kpiCard({ label, val, sub, pct, cls }) {
  const r = 18, c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  const color = cls === 'danger' ? 'var(--red-light)' : cls === 'amber' ? 'var(--amber)' : cls === 'teal' ? 'var(--teal-light)' : 'var(--g500)';
  return `
    <div class="kpi-card ${cls}">
      <div class="kpi-label">${escHtml(label)}</div>
      <div class="kpi-val">${escHtml(String(val))}</div>
      <div class="kpi-sub">${escHtml(sub)}</div>
      <div class="kpi-bar"><div class="kpi-fill" style="width:${Math.min(100,pct)}%"></div></div>
      <div class="kpi-ring">
        <svg class="ring-svg" width="44" height="44" viewBox="0 0 44 44">
          <circle class="ring-bg" cx="22" cy="22" r="${r}"/>
          <circle class="ring-fg" cx="22" cy="22" r="${r}"
            stroke="${color}"
            stroke-dasharray="${c}"
            stroke-dashoffset="${offset}"
          />
        </svg>
      </div>
    </div>
  `;
}

function renderResponsibleRows() {
  const open = state.app.tasks.filter(t => !['Completada','Cancelada'].includes(t.status));
  const map = {};
  open.forEach(t => {
    const n = t.assignee_name || userName(t.assignee_user_id, 'Sin asignar');
    if (!map[n]) map[n] = { open:0, urgent:0 };
    map[n].open++;
    if (t.urgent) map[n].urgent++;
  });
  return Object.entries(map).sort((a,b) => b[1].urgent - a[1].urgent)
    .map(([n,m]) => `<tr><td>${escHtml(n)}</td><td>${m.open}</td><td>${m.urgent}</td></tr>`)
    .join('') || '<tr><td colspan="3" class="muted">Sin datos.</td></tr>';
}

function renderProjectRows() {
  return state.app.projects.map(p => {
    const tasks = state.app.tasks.filter(t => t.project_id === p.project_id);
    const urgent = tasks.filter(t => t.urgent).length;
    const avg = tasks.length
      ? Math.round(tasks.reduce((a,t) => a + Number(t.progress||0), 0) / tasks.length)
      : 0;
    return `<tr>
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${escHtml(p.color||'#0f3d1d')};margin-right:6px;vertical-align:middle"></span>${escHtml(p.project_name)}</td>
      <td>${tasks.length}</td><td>${urgent}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="prog-wrap" style="width:60px"><div class="prog-fill green" style="width:${avg}%"></div></div>
          <span class="muted small">${avg}%</span>
        </div>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" class="muted">Sin proyectos.</td></tr>';
}

/* ═══════════════════════════════════════
   RENDER: TIMELINE (GANTT)
═══════════════════════════════════════ */
function renderTimeline() {
  const tasks = filtered();
  const target = qs('tab-timeline');
  if (!tasks.length) {
    target.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No hay tareas que coincidan con los filtros actuales.</div></div>`;
    return;
  }

  const all_dates = tasks.flatMap(t => [t.start_date, t.due_date].filter(Boolean));
  const startMin  = (all_dates.length ? all_dates.sort()[0] : todayIso());
  const dueMax    = (all_dates.length ? all_dates.sort().slice(-1)[0] : todayIso());
  const span      = Math.max(1, daysBetween(startMin, dueMax) + 1);
  const today     = todayIso();

  // Compute month headers
  const months = [];
  let cursor = new Date(startMin + 'T00:00:00');
  const endDate = new Date(dueMax + 'T00:00:00');
  while (cursor <= endDate) {
    const m = cursor.getMonth(), y = cursor.getFullYear();
    let days = 0;
    while (cursor <= endDate && cursor.getMonth() === m && cursor.getFullYear() === y) {
      days++; cursor.setDate(cursor.getDate() + 1);
    }
    months.push({ label: new Date(y, m, 1).toLocaleDateString('es-PY', { month:'short', year:'numeric' }), days });
  }

  // Today column index
  const todayOffset = daysBetween(startMin, today);
  const isCompact = state.ganttMode === 'compact';

  let html = `
    <div class="timeline-shell">
      <div class="timeline-header">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="card-title">Cronograma interactivo</div>
            <div class="card-sub">Doble clic en bloque para editar · Puntero para información ampliada</div>
          </div>
          <div class="timeline-toolbar">
            <button class="btn ghost sm" id="btn-gantt-compact">
              ${isCompact ? '⬜ Expandir' : '⬛ Compactar'}
            </button>
            <button class="btn ghost sm" id="btn-gantt-today">📍 Hoy</button>
          </div>
        </div>
      </div>
      <div class="timeline-scroll" id="tl-scroll">
        <div class="timeline-grid" style="--tl-day-w:${isCompact?22:26}px">
          <div class="tl-months">
            <div class="tl-label-cell"><strong style="font-size:12px;color:var(--muted)">Estructura del proyecto</strong></div>
            <div class="tl-cells" style="width:${span * (isCompact?22:26)}px;flex-shrink:0">
              ${months.map(m => `<div class="month-cell" style="grid-column:span ${m.days}">${escHtml(m.label)}</div>`).join('')}
            </div>
          </div>
          <div class="tl-days">
            <div class="tl-label-cell"><strong style="font-size:11px;color:var(--muted)">Intervalo diario</strong></div>
            <div class="tl-cells" style="width:${span * (isCompact?22:26)}px;flex-shrink:0">
              ${Array.from({ length: span }, (_,i) => {
                const d = new Date(startMin + 'T00:00:00'); d.setDate(d.getDate() + i);
                const isToday2 = localKey(d) === today;
                return `<div class="day-cell${isToday2?' today-col':''}">${String(d.getDate()).padStart(2,'0')}</div>`;
              }).join('')}
            </div>
          </div>
  `;

  const dayW = isCompact ? 22 : 26;
  // Ancho total del área de celdas — crítico para posicionamiento absoluto de bloques
  const cellsW = span * dayW;

  tasks.forEach(task => {
    const sd   = task.start_date || task.due_date || startMin;
    const ed   = task.due_date   || task.start_date || startMin;
    const off  = Math.max(0, daysBetween(startMin, sd));
    const len  = Math.max(1, daysBetween(sd, ed) + 1);
    const left = off * dayW + 4;
    const isHito = task.type === 'Hito';
    const width = isHito ? dayW : Math.max(34, len * dayW - 8);
    const blockCls = ['Tema','Subtema','Hito'].includes(task.type)
      ? `type-${task.type}` : `priority-${task.priority}`;

    html += `
      <div class="tl-row row-${escHtml(task.type)}${isCompact ? ' compact' : ''}">
        <div class="tl-label-cell">
          <div class="tl-label theme-${escHtml(task.type)}">
            <div class="tl-title" data-open="${escHtml(task.task_id)}">${escHtml(task.title)}</div>
            <div class="tl-meta">${escHtml(projName(task.project_id))} · ${escHtml(task.status)} · ${escHtml(task.assignee_name || userName(task.assignee_user_id) || 'Sin asignar')}</div>
            ${!isCompact ? `<div class="prog-wrap" style="width:100%;margin-top:4px"><div class="prog-fill ${task.overdue?'red':'green'}" style="width:${task.progress||0}%"></div></div>` : ''}
          </div>
        </div>
        <div class="tl-cells" style="width:${cellsW}px;flex-shrink:0">
          ${Array.from({ length: span }, (_,i) => {
            const isT = i === todayOffset;
            return `<div class="day-cell${isT?' today-col':''}"></div>`;
          }).join('')}
          ${todayOffset >= 0 && todayOffset < span
            ? `<div class="today-line" style="left:${todayOffset * dayW + dayW/2}px"></div>` : ''}
          <div class="tl-block ${blockCls} status-${normalClass(task.status)}"
            data-open="${escHtml(task.task_id)}"
            data-tt="${escHtml(task.task_id)}"
            data-dbl="${escHtml(task.task_id)}"
            style="left:${left}px;width:${width}px;border-left:4px solid ${projColor(task.project_id)}">
            <div class="b-title">${escHtml(task.title)}</div>
            ${!isHito && !isCompact
              ? `<div class="b-sub">${escHtml(task.start_date||'')} → ${escHtml(task.due_date||'')} · ${task.progress||0}%</div>`
              : ''}
          </div>
        </div>
      </div>
    `;
  });

  html += `</div></div></div>`;
  target.innerHTML = html;

  // Buttons
  qs('btn-gantt-compact').onclick = () => {
    state.ganttMode = state.ganttMode === 'compact' ? 'normal' : 'compact';
    store.set('paracel_gantt_mode', state.ganttMode);
    renderTimeline();
  };
  qs('btn-gantt-today').onclick = () => {
    const scroll = qs('tl-scroll');
    const todayPx = (todayOffset ?? 0) * dayW;
    scroll.scrollLeft = Math.max(0, todayPx - 200);
  };

  bindOpenTask();
  attachTooltips('[data-tt]');
  attachGanttDbl();
}

function attachGanttDbl() {

function projNameShort(id) {
  const full = projName(id);
  return full.length > 14 ? full.slice(0,12)+'…' : full;
}

function renderCalMiniGantt(year, month, tasks) {
  const daysInM = new Date(year, month + 1, 0).getDate();
  const mStart  = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const mEnd    = `${year}-${String(month+1).padStart(2,'0')}-${String(daysInM).padStart(2,'0')}`;
  const today   = todayIso();
  const todayDay = today >= mStart && today <= mEnd ? Number(today.slice(8)) : null;

  const projMap = {};
  tasks.forEach(t => {
    const s = t.start_date||t.due_date||''; const e = t.due_date||t.start_date||'';
    if (!s && !e) return;
    if ((e||mStart) < mStart || (s||mEnd) > mEnd) return;
    if (!projMap[t.project_id]) projMap[t.project_id] = [];
    projMap[t.project_id].push(t);
  });
  const projIds = Object.keys(projMap);
  if (!projIds.length) return '<div class="muted small">Sin proyectos en este mes.</div>';

  const dayPct = 100 / daysInM;
  return `<div class="mini-gantt-wrap">
    <div class="mg-header">
      <div class="mg-label"></div>
      <div class="mg-days">
        ${Array.from({length:daysInM},(_,i)=>`<div class="mg-day${i+1===todayDay?' mg-today':''}">${i+1}</div>`).join('')}
      </div>
    </div>
    ${projIds.map(pid => {
      const p = state.app.projects.find(x=>x.project_id===pid);
      const pColor = p?.color||'#0f3d1d';
      const pTasks = projMap[pid];
      const avg = Math.round(pTasks.reduce((a,t)=>a+Number(t.progress||0),0)/pTasks.length);
      return `<div class="mg-proj-row">
        <div class="mg-label" title="${escHtml(p?.project_name||pid)}" style="border-left:3px solid ${pColor}">
          <span>${escHtml(projNameShort(pid))}</span>
          <span class="mg-pct">${avg}%</span>
        </div>
        <div class="mg-days" style="position:relative">
          ${Array.from({length:daysInM},()=>'<div class="mg-day-cell"></div>').join('')}
          ${todayDay?`<div class="mg-today-line" style="left:${(todayDay-1)*dayPct}%"></div>`:''}
          ${pTasks.map(t=>{
            const ts=t.start_date||t.due_date||mStart; const te=t.due_date||t.start_date||mStart;
            const s=ts<mStart?mStart:ts; const e=te>mEnd?mEnd:te;
            const sd=Number(s.slice(8)); const ed=Number(e.slice(8));
            const lp=((sd-1)*dayPct); const wp=Math.max(dayPct,((ed-sd+1)*dayPct));
            const bc=t.overdue?'#c0392b':pColor;
            return `<div class="mg-block" data-open="${escHtml(t.task_id)}" data-tt="${escHtml(t.task_id)}"
              style="left:${lp}%;width:${wp}%;background:${bc};opacity:${t.status==='Completada'?0.45:0.82}"
              title="${escHtml(t.title)}"></div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderCalendar() {
  const { month, year } = state.calendar;
  const first = new Date(year, month, 1);
  const startWd = (first.getDay() + 6) % 7;
  const daysInM = new Date(year, month + 1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();
  const tasks = filtered();

  const cells = [];
  for (let i = 0; i < 42; i++) {
    let dayNum, cellDate, muted = false;
    if (i < startWd) {
      dayNum = prevDays - startWd + i + 1;
      cellDate = localKey(new Date(year, month - 1, dayNum)); muted = true;
    } else if (i >= startWd + daysInM) {
      dayNum = i - startWd - daysInM + 1;
      cellDate = localKey(new Date(year, month + 1, dayNum)); muted = true;
    } else {
      dayNum = i - startWd + 1;
      cellDate = localKey(new Date(year, month, dayNum));
    }
    const dayTasks = tasks.filter(t => {
      const s = t.start_date||t.due_date||cellDate;
      const e = t.due_date||t.start_date||cellDate;
      return s <= cellDate && e >= cellDate;
    }).slice(0, 4);
    const isToday = cellDate === todayIso();
    cells.push(`
      <div class="day-card${isToday?' today':''}" style="${muted?'opacity:.4':''}">
        <div class="day-num">${dayNum}</div>
        ${dayTasks.map(t => {
          const pColor = projColor(t.project_id);
          return `<span class="day-chip" data-open="${escHtml(t.task_id)}" data-tt="${escHtml(t.task_id)}"
            style="background:${pColor}22;color:${pColor};border-left:3px solid ${pColor}"
          >${escHtml(projNameShort(t.project_id))}: ${escHtml(t.title)}</span>`;
        }).join('')}
      </div>
    `);
  }

  const monthLabel = first.toLocaleDateString('es-PY', { month:'long', year:'numeric' });
  const agenda = tasks
    .filter(t => (t.start_date||'').startsWith(`${year}-${String(month+1).padStart(2,'0')}`))
    .sort((a,b) => (a.start_date||'').localeCompare(b.start_date||''))
    .slice(0, 20);

  const mStart = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const mEnd   = `${year}-${String(month+1).padStart(2,'0')}-${String(daysInM).padStart(2,'0')}`;
  const projsInMonth = [...new Set(tasks.filter(t => {
    const s=t.start_date||t.due_date||''; const e=t.due_date||t.start_date||'';
    return (!e||e>=mStart) && (!s||s<=mEnd);
  }).map(t=>t.project_id))];

  qs('tab-calendar').innerHTML = `
    <div class="calendar-shell">
      <div class="card">
        <div class="cal-header">
          <div class="cal-title">${escHtml(monthLabel)}</div>
          <div class="cal-nav">
            <button class="btn ghost sm" id="cal-prev">◀</button>
            <button class="btn ghost sm" id="cal-today">Hoy</button>
            <button class="btn ghost sm" id="cal-next">▶</button>
          </div>
        </div>
        <div class="proj-legend">
          ${projsInMonth.map(pid => {
            const p=state.app.projects.find(x=>x.project_id===pid);
            const pc=p?.color||'#0f3d1d';
            return `<span class="proj-pill" data-proj-id="${escHtml(pid)}"
              style="border-color:${pc};color:${pc}"
              title="${escHtml(p?.project_name||pid)}">
              <span class="proj-dot" style="background:${pc}"></span>
              ${escHtml(projNameShort(pid))}
            </span>`;
          }).join('')}
        </div>
        <div class="cal-grid">
          ${['Lu','Ma','Mi','Ju','Vi','Sá','Do'].map(d=>`<div class="weekday">${d}</div>`).join('')}
          ${cells.join('')}
        </div>
      </div>
      <div class="stack">
        <div class="card">
          <div class="section-title">📊 Línea de tiempo por proyecto</div>
          <div class="section-sub" style="margin-bottom:10px">Tareas del mes · rojo = atrasada · hover para detalles</div>
          ${renderCalMiniGantt(year, month, tasks)}
        </div>
        <div class="card">
          <div class="section-title">📋 Agenda del mes</div>
          <div class="section-sub">Tareas que inician en ${escHtml(monthLabel)}</div>
          <div class="agenda-list" style="margin-top:10px">
            ${agenda.map(t => `
              <div class="agenda-item" data-open="${escHtml(t.task_id)}" data-tt="${escHtml(t.task_id)}">
                <div style="display:flex;align-items:center;gap:7px">
                  <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;background:${escHtml(projColor(t.project_id))}"></span>
                  <strong>${escHtml(t.title)}</strong>
                </div>
                <div class="muted small">${escHtml(projNameShort(t.project_id))} · ${escHtml(fmtDate(t.start_date))} → ${escHtml(fmtDate(t.due_date))}</div>
                <div style="margin-top:4px">
                  <span class="badge status-${normalClass(t.status)}">${escHtml(t.status)}</span>
                  <span class="badge priority-${normalClass(t.priority)}" style="margin-left:4px">${escHtml(t.priority)}</span>
                </div>
              </div>
            `).join('') || '<div class="empty-state" style="padding:20px 0"><div class="empty-icon">📆</div><div class="empty-text">Sin eventos en este mes.</div></div>'}
          </div>
        </div>
      </div>
    </div>
  `;
  qs('cal-prev').onclick = () => { state.calendar.month--; if (state.calendar.month<0){state.calendar.month=11;state.calendar.year--;} renderCalendar(); };
  qs('cal-next').onclick = () => { state.calendar.month++; if (state.calendar.month>11){state.calendar.month=0;state.calendar.year++;} renderCalendar(); };
  qs('cal-today').onclick = () => { const n=new Date(); state.calendar.month=n.getMonth(); state.calendar.year=n.getFullYear(); renderCalendar(); };
  qsa('.proj-pill').forEach(pill => {
    pill.onclick = () => {
      const pid = pill.getAttribute('data-proj-id');
      state.filters.project = state.filters.project===pid ? '' : pid;
      qs('filter-project').value = state.filters.project;
      renderCalendar();
    };
  });
  bindOpenTask();
  attachTooltips('[data-tt]');
}

/* ═══════════════════════════════════════
   TASK MODAL — abre inmediatamente con datos locales,
   luego carga adjuntos/comentarios en background
═══════════════════════════════════════ */
async function openTask(taskId) {
  // 1. Buscar en cache local (sin esperar red)
  const tLocal = state.app.tasks.find(x => x.task_id === taskId);
  if (!tLocal) { toast('Tarea no encontrada.', true); return; }

  // 2. Poblar formulario inmediatamente
  _fillTaskForm(tLocal);

  // 3. Mostrar modal ya — el usuario puede editar mientras cargan los detalles
  qs('task-detail-side').innerHTML = `
    <div class="section-title" style="margin-bottom:10px">📎 Adjuntos & comentarios</div>
    <div class="skeleton" style="height:40px;margin-bottom:8px"></div>
    <div class="skeleton" style="height:40px;margin-bottom:8px"></div>
    <div class="skeleton" style="height:60px"></div>
  `;
  openModal('task-modal');

  // 4. Cargar adjuntos y comentarios en background (sin bloquear)
  try {
    const detail = await api('getTaskDetail', state.token, taskId);
    // Actualizar solo el panel lateral; no tocar el form que el usuario puede estar editando
    const atts  = (detail.attachments||[]);
    const comms = (detail.comments||[]).slice().reverse();
    const attHtml = atts.map(a => `
      <div class="attachment-item">
        <div><strong>${escHtml(a.file_name)}</strong></div>
        <div class="muted small">${escHtml(a.mime_type||'')} · ${escHtml(a.uploaded_by||'')}</div>
        <div style="margin-top:6px"><a href="${escHtml(a.file_url)}" target="_blank">↗ Abrir en Drive</a></div>
      </div>
    `).join('') || '<div class="muted small">Sin adjuntos.</div>';
    const commHtml = comms.map(c => `
      <div class="comment-item">
        <div style="display:flex;justify-content:space-between">
          <strong>${escHtml(c.author_name)}</strong>
          <span class="muted small">${escHtml(c.created_at||'')}</span>
        </div>
        <div style="margin-top:5px">${escHtml(c.message)}</div>
      </div>
    `).join('') || '<div class="muted small">Sin comentarios.</div>';
    // Solo actualizar si el modal sigue abierto con la misma tarea
    if (qs('task-id').value === taskId) {
      qs('task-detail-side').innerHTML = `
        <div class="section-title" style="margin-bottom:10px">📎 Adjuntos & comentarios</div>
        <div class="attachment-list" style="margin-bottom:12px">${attHtml}</div>
        <div class="comment-list">${commHtml}</div>
      `;
    }
  } catch (err) { /* silencioso — el form ya está abierto */ }
}

function _fillTaskForm(t) {
  qs('task-modal-title').textContent = `Editar · ${t.title}`;
  qs('task-id').value = t.task_id;
  qs('task-project').value = t.project_id;
  qs('task-type').value = t.type||'Actividad';
  qs('task-status').value = t.status||'Pendiente';
  qs('task-priority').value = t.priority||'Media';
  qs('task-title').value = t.title||'';
  qs('task-start').value = t.start_date||'';
  qs('task-due').value = t.due_date||'';
  qs('task-progress').value = t.progress||0;
  qs('task-work-path').value = t.work_path||'';
  qs('task-folder-url').value = t.folder_url||'';
  qs('task-description').value = t.description||'';
  qs('task-tags').value = t.tags||'';
  qs('task-estimated-hours').value = t.estimated_hours||'';
  qs('task-actual-hours').value = t.actual_hours||'';
  qs('task-dependencies').value = t.dependency_ids||'';
  qs('task-comment').value = '';
  qs('task-upload').value = '';
  qs('upload-preview').src = ''; qs('upload-preview').style.display = 'none';
  qs('upload-progress').classList.add('hidden');
  fillParentOptions(t.project_id, t.task_id);
  qs('task-parent').value = t.parent_id||'';

  qs('btn-delete-task').classList.remove('hidden');

function fillParentOptions(projectId, currentId = '') {
  const opts = ['<option value="">Sin padre</option>']
    .concat(state.app.tasks
      .filter(t => t.project_id === projectId && t.task_id !== currentId)
      .map(t => `<option value="${escHtml(t.task_id)}">${escHtml(t.title)} (${escHtml(t.type)})</option>`));
  qs('task-parent').innerHTML = opts.join('');
}

function resetTaskModal() {
  qs('task-form').reset(); qs('task-id').value = '';
  qs('task-modal-title').textContent = 'Nueva tarea';
  qs('btn-delete-task').classList.add('hidden');
  qs('task-detail-side').innerHTML = `<div class="muted small">Adjuntos y comentarios aparecerán aquí una vez guardada la tarea.</div>`;
  qs('upload-preview').src = ''; qs('upload-preview').style.display = 'none';
  qs('upload-progress').classList.add('hidden');

async function saveTask() {
  try {
    const tid = qs('task-id').value;
    const uid = qs('task-assignee').value||'';
    const uname = uid ? (state.app.users.find(u=>u.user_id===uid)||{}).display_name||'' : '';
    const payload = {
      task_id: tid||'', project_id: qs('task-project').value,
      type: qs('task-type').value, status: qs('task-status').value,
      priority: qs('task-priority').value, title: qs('task-title').value,
      parent_id: qs('task-parent').value,
      dependency_ids: qs('task-dependencies').value,
      start_date: qs('task-start').value, due_date: qs('task-due').value,
      progress: Number(qs('task-progress').value||0),
      assignee_user_id: uid, assignee_name: uname,
      work_path: qs('task-work-path').value,
      folder_url: qs('task-folder-url').value,
      description: qs('task-description').value,
      tags: qs('task-tags').value,
      estimated_hours: qs('task-estimated-hours').value,
      actual_hours: qs('task-actual-hours').value,
      comment_message: qs('task-comment').value
    };
    const saved = await api('saveTask', state.token, payload);
    const fileInput = qs('task-upload');
    if (fileInput.files?.length) {
      const f = fileInput.files[0];
      qs('upload-progress').textContent = '⬆️ Subiendo…'; qs('upload-progress').classList.remove('hidden');
      const b64 = await fileToB64(f);
      await api('uploadAttachment', state.token, saved.task_id||payload.task_id, f.name, f.type, b64);
      qs('upload-progress').classList.add('hidden');
    }
    closeModal('task-modal');
    await refreshData();
    toast(tid ? '✅ Tarea actualizada.' : '✅ Tarea creada.');
  } catch (err) { toast(err.message, true); }
}

function fileToB64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = ev => {
      if (file.type.startsWith('image/')) {
        const p = qs('upload-preview'); p.src = ev.target.result; p.style.display='block';
      }
      res(String(ev.target.result||'').split(',')[1]||'');
    };
    reader.onerror = () => rej(new Error('No se pudo leer el archivo.'));
    reader.readAsDataURL(file);
  });
}

async function deleteTask() {
  const taskId = qs('task-id').value;

    await refreshData();
    toast('🗑 Tarea eliminada.');

}

function bindPhotoUploads() {
  qsa('.photo-upload-input').forEach(input => {
    input.onchange = ev => {
      const f = ev.target.files?.[0]; if (!f) return;
      const uid = input.getAttribute('data-user-id');
      const reader = new FileReader();
      reader.onload = e => {
        const dataUrl = e.target.result;
        store.set(`paracel_photo_${uid}`, dataUrl);
        // Update avatar immediately
        const av = qs(`avatar-${uid}`);
        if (av) {
          av.style.backgroundImage = `url(${dataUrl})`;
          av.style.backgroundSize = 'cover';
          av.style.backgroundPosition = 'center';
          av.textContent = '';
        }
        toast('✅ Foto actualizada.');
        renderSettings(); // re-render to show remove button
      };
      reader.readAsDataURL(f);
    };
  });
  qsa('[data-remove-photo]').forEach(btn => {
    btn.onclick = () => {
      const uid = btn.getAttribute('data-remove-photo');
      store.del(`paracel_photo_${uid}`);
      toast('Foto eliminada.');
      renderSettings();
    };
  });
}

  h1 { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 900; color: #0f3d1d; letter-spacing: -.5px; }
  @media print {
    body { padding: 16px; }
    .no-print { display: none !important; }
    .page-break { page-break-before: always; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0f3d1d">
  <div>
    <div style="font-size:11px;font-weight:700;color:#15803d;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">PARACEL · Gestor Colaborativo</div>
    <h1>Reporte de Estado de Proyectos</h1>
    <div style="font-size:12px;color:#6b7280;margin-top:4px">Generado el ${today} · ${state.app.session.display_name}</div>
  </div>
  <div style="text-align:right">
    <div style="font-size:36px;font-weight:900;color:#0f3d1d;line-height:1">${d.avg_progress}%</div>
    <div style="font-size:11px;color:#6b7280">avance general</div>
  </div>
</div>

<!-- KPIs EJECUTIVOS -->
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px">
  ${[
    { label:'Proyectos', val: d.projects, color:'#0f3d1d' },
    { label:'Tareas abiertas', val: d.open_tasks, color:'#1d4ed8' },
    { label:'Urgentes', val: d.urgent, color:'#d97706' },
    { label:'ATRASADAS', val: d.overdue, color:'#c0392b' },
    { label:'Bloqueadas', val: d.blocked, color:'#7c3aed' },
  ].map(k=>`
    <div style="border:1px solid #e5e7eb;border-radius:10px;padding:12px;text-align:center;border-top:3px solid ${k.color}">
      <div style="font-size:28px;font-weight:900;color:${k.color};line-height:1">${k.val}</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-top:4px;font-weight:700">${k.label}</div>
    </div>
  `).join('')}
</div>

${overdue.length ? `
<!-- ALERTA: TAREAS ATRASADAS -->
<div style="background:#fff5f5;border:1.5px solid #fecaca;border-radius:10px;padding:14px 16px;margin-bottom:24px">
  <div style="font-size:13px;font-weight:800;color:#991b1b;margin-bottom:10px">🚨 RESUMEN DE TAREAS ATRASADAS (${overdue.length})</div>
  <table style="width:100%;border-collapse:collapse">
    <thead><tr style="background:#fee2e2">
      <th style="padding:5px 8px;font-size:10px;text-align:left;color:#991b1b">Tarea</th>
      <th style="padding:5px 8px;font-size:10px;text-align:left;color:#991b1b">Proyecto</th>
      <th style="padding:5px 8px;font-size:10px;text-align:left;color:#991b1b">Responsable</th>
      <th style="padding:5px 8px;font-size:10px;text-align:left;color:#991b1b">Venció</th>
      <th style="padding:5px 8px;font-size:10px;text-align:left;color:#991b1b">Avance</th>
    </tr></thead>
    <tbody>
      ${overdue.map(t=>`
        <tr>
          <td style="padding:5px 8px;font-size:11px;border-bottom:1px solid #fecaca;font-weight:600">${escHtml(t.title)}</td>
          <td style="padding:5px 8px;font-size:11px;border-bottom:1px solid #fecaca">${escHtml(projName(t.project_id))}</td>
          <td style="padding:5px 8px;font-size:11px;border-bottom:1px solid #fecaca">${escHtml(t.assignee_name||userName(t.assignee_user_id)||'Sin asignar')}</td>
          <td style="padding:5px 8px;font-size:11px;border-bottom:1px solid #fecaca;color:#c0392b;font-weight:700">${escHtml(t.due_date||'—')}</td>
          <td style="padding:5px 8px;font-size:11px;border-bottom:1px solid #fecaca">${t.progress||0}%</td>
        </tr>
      `).join('')}
    </tbody>
  </table>
</div>
` : ''}

<!-- DESGLOSE POR PROYECTO -->
<div style="font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:#0f3d1d;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #d1fae5">
  Detalle por proyecto
</div>
${projectSection}

<!-- TEAM -->
<div class="page-break" style="margin-top:28px;padding-top:20px">
  <div style="font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:#0f3d1d;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #d1fae5">
    Equipo
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:12px">
    ${state.app.users.map(u => {
      const photo = photoMap[u.user_id];
      const uTasks = tasks.filter(t => t.assignee_user_id===u.user_id || (!t.assignee_user_id && (t.assignee_name||'').toLowerCase()===(u.display_name||'').toLowerCase()));
      const open = uTasks.filter(t=>!['Completada','Cancelada'].includes(t.status)).length;
      const done = uTasks.filter(t=>t.status==='Completada').length;
      return `
        <div style="border:1px solid #e5e7eb;border-radius:10px;padding:12px;min-width:150px;text-align:center">
          ${photo
            ? `<img src="${photo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block;border:2px solid #d1fae5">`
            : `<div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#14532d,#22c55e);color:#fff;font-size:22px;font-weight:900;display:grid;place-items:center;margin:0 auto 8px">${escHtml((u.display_name||'?').charAt(0).toUpperCase())}</div>`
          }
          <div style="font-weight:700;font-size:12px">${escHtml(u.display_name)}</div>
          <div style="font-size:10px;color:#6b7280;text-transform:capitalize;margin:2px 0">${escHtml(u.role)}</div>
          <div style="font-size:10px;color:#374151;margin-top:4px"><strong>${open}</strong> abiertas · <strong>${done}</strong> completadas</div>
        </div>
      `;
    }).join('')}
  </div>
</div>

<div style="margin-top:32px;padding-top:14px;border-top:1px solid #e5e7eb;font-size:10px;color:#9ca3af;text-align:center">
  PARACEL · Gestor Colaborativo de Proyectos · Reporte generado automáticamente el ${today}
</div>

<div class="no-print" style="margin-top:24px;text-align:center">
  <button onclick="window.print()" style="padding:12px 28px;background:#0f3d1d;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">
    🖨 Imprimir / Guardar como PDF
  </button>
  <button onclick="window.close()" style="margin-left:10px;padding:12px 20px;background:#e5e7eb;color:#374151;border:none;border-radius:10px;font-size:14px;cursor:pointer">
    Cerrar
  </button>
</div>
</body>
</html>`;

  const win = window.open('', '_blank', 'width=900,height=700');
  if (!win) { toast('El navegador bloqueó la ventana emergente. Permítela e intenta de nuevo.', true); return; }
  win.document.write(html);
  win.document.close();
}

/* ═══════════════════════════════════════
   FILTERS
═══════════════════════════════════════ */
function applyFilters() {
  state.filters.project  = qs('filter-project').value;
  state.filters.status   = qs('filter-status').value;
  state.filters.priority = qs('filter-priority').value;
  state.filters.search   = qs('filter-search').value.trim();
  renderTab();
}

/* ═══════════════════════════════════════
   TAB ROUTER
═══════════════════════════════════════ */
function renderTab() {
  qsa('.tab-section').forEach(s => s.classList.remove('active'));
  qs('tab-'+state.tab).classList.add('active');
  qsa('.sidebar .nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === state.tab));
  const map = {
    dashboard: renderDashboard,
    timeline:  renderTimeline,
    calendar:  renderCalendar,
    team:      renderTeam,
    files:     renderFiles,
    activity:  renderActivity,
    settings:  renderSettings
  };
  (map[state.tab] || (() => {}))();
}

/* ═══════════════════════════════════════
   DATA REFRESH
═══════════════════════════════════════ */
async function refreshData() {
  try {
    state.app = await api('getBootstrap', state.token);
    store.set('paracel_token', state.token);
    qs('session-name').textContent = state.app.session.display_name;
    qs('session-role').textContent = state.app.session.role;
    renderFilters();
    renderMessageBar();
    renderTab();
  } catch(err) {
    qs('login-error').textContent = 'Error fatal: ' + String(err.message||err);
    qs('login-error').classList.remove('hidden');
    logoutLocal();
  }
}

function logoutLocal() {
  store.del('paracel_token');
  state.token = ''; state.app = null;
  qs('main-screen').classList.add('hidden');
  qs('login-screen').classList.remove('hidden');
}

async function tryAutoSession() {
  if (!state.token) return;
  try {
    await refreshData();
    qs('login-screen').classList.add('hidden');
    qs('main-screen').classList.remove('hidden');
  } catch { logoutLocal(); }
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  // Dark mode
  applyDark();
  qs('dark-toggle').onclick = () => {
    state.dark = !state.dark;
    store.set('paracel_dark', state.dark ? '1' : '0');
    applyDark();
  };

  // Close modals
  qsa('[data-close-modal]').forEach(btn => btn.onclick = () => closeModal(btn.dataset.closeModal));
  // Close gantt panel
  qs('gfp-close').onclick = () => qs('gantt-float-panel').classList.add('hidden');

  // Login
  qs('login-form').onsubmit = async ev => {
    ev.preventDefault();
    qs('login-error').classList.add('hidden');
    try {
      const r = await api('login', qs('login-username').value, qs('login-password').value);
      state.token = r.token;
      store.set('paracel_token', r.token);
      qs('login-screen').classList.add('hidden');
      qs('main-screen').classList.remove('hidden');
      await refreshData();
      toast('👋 Bienvenido/a al sistema.');
    } catch(err) {
      qs('login-error').textContent = err.message;
      qs('login-error').classList.remove('hidden');
    }
  };

  // Nav
  qsa('.sidebar .nav-btn').forEach(btn => {
    btn.onclick = () => { state.tab = btn.dataset.tab; renderTab(); };
  });

  // Filters
  qs('filter-project').onchange  = applyFilters;
  qs('filter-status').onchange   = applyFilters;
  qs('filter-priority').onchange = applyFilters;
  qs('filter-search').oninput    = applyFilters;

  // Spreadsheet & PDF
  qs('btn-open-sheet').onclick  = openSpreadsheet;
  qs('btn-pdf-report').onclick  = printPdfReport;

  // Toolbar
  qs('btn-refresh').onclick = refreshData;
  qs('btn-logout').onclick = async () => {
    try { if (state.token) await api('logout', state.token); } catch {}
    logoutLocal();
  };

  // New task
  qs('btn-new-task').onclick = () => {
    resetTaskModal();
    openModal('task-modal');
  };
  qs('task-project').onchange = () => fillParentOptions(qs('task-project').value, qs('task-id').value);
  qs('task-upload').onchange = ev => {
    const f = ev.target.files?.[0]; if (!f) return;
    if (f.type.startsWith('image/')) {
      const r = new FileReader(); r.onload = e => { const p=qs('upload-preview'); p.src=e.target.result; p.style.display='block'; }; r.readAsDataURL(f);
    }
  };
  qs('btn-save-task').onclick    = saveTask;
  qs('btn-delete-task').onclick  = deleteTask;
  qs('btn-save-project').onclick = saveProject;
  qs('btn-save-user').onclick    = saveUser;
  qs('btn-preview-digest').onclick = previewDigest;

  tryAutoSession();
});
</script>
