<style>
/* ================================================================
   PARACEL · Gestor Colaborativo de Proyectos v2
   Paleta verde institucional con diseño premium
   ================================================================ */
:root {
  --bg:            #eef7f0;
  --bg-2:          #f6fbf7;
  --surface:       #ffffff;
  --surface-2:     #f3faf5;
  --line:          #d0e6d6;
  --text:          #0f2418;
  --muted:         #4d6658;

  /* Escala de verdes PARACEL */
  --g900: #0f2418;
  --g800: #14532d;
  --g700: #15803d;
  --g600: #16a34a;
  --g500: #22c55e;
  --g400: #4ade80;
  --g300: #86efac;
  --g200: #bbf7d0;
  --g100: #dcfce7;
  --g50:  #f0fdf4;

  --yellow:  #d97706;
  --red:     #b91c1c;
  --blue:    #1d4ed8;
  --teal:    #0f766e;

  --shadow:         0 8px 28px rgba(15,36,24,.10);
  --shadow-lg:      0 20px 50px rgba(15,36,24,.14);
  --radius:         20px;
  --radius-sm:      12px;
  --timeline-label-width: 380px;
  --timeline-day-width:   28px;
  --topbar-h:   80px;
  --sidebar-w:  320px;

  font-family: "Segoe UI", system-ui, Arial, sans-serif;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; background: linear-gradient(160deg, var(--g50), #e8f4ea 50%, var(--bg)); color: var(--text); }
.hidden { display: none !important; }
.muted  { color: var(--muted); }
.small  { font-size: 12px; }
.wide   { width: 100%; }

/* ── PANTALLA DE LOGIN ── */
.screen { min-height: 100vh; }
.login-screen {
  display: grid; place-items: center; padding: 24px;
  background:
    radial-gradient(ellipse at 70% 20%, rgba(34,197,94,.18), transparent 45%),
    radial-gradient(ellipse at 10% 80%, rgba(21,128,61,.14), transparent 40%),
    linear-gradient(160deg, var(--g50), #e6f4ea);
}
.login-card {
  width: min(520px, 100%);
  background: rgba(255,255,255,.96);
  border: 1px solid rgba(15,36,24,.08);
  border-radius: 28px;
  padding: 32px;
  box-shadow: var(--shadow-lg);
}
.brand-mark {
  width: 66px; height: 66px; border-radius: 20px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, var(--g800), var(--g500));
  color: #fff; font-size: 34px; font-weight: 900;
  box-shadow: 0 12px 22px rgba(20,83,45,.26);
}
.brand-mark.small { width: 48px; height: 48px; border-radius: 14px; font-size: 24px; }
.login-card h1 { margin: 18px 0 8px; font-size: 26px; font-weight: 900; color: var(--g900); line-height: 1.2; }
.login-help {
  margin-top: 18px; padding: 14px 16px; border-radius: 16px;
  background: var(--g100); border: 1px solid var(--g200);
  color: var(--g800); font-size: 13px;
}
.error-box {
  margin-top: 14px; padding: 12px 14px; border-radius: 12px;
  background: #fff1f2; border: 1px solid #fecdd3; color: #9f1239;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--topbar-h);
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 14px; align-items: center;
  padding: 0 20px;
  background: linear-gradient(180deg, var(--g800) 0%, var(--g900) 100%);
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 4px 18px rgba(15,36,24,.28);
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar-center { min-width: 0; }
.app-title  { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -.3px; }
.app-subtitle { font-size: 11px; color: var(--g300); margin-top: 2px; }
.message-bar {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.18);
  color: #e2fce8; padding: 10px 14px; border-radius: 14px;
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.urgent-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: #dc2626; color: #fff;
  border-radius: 999px; font-size: 11px; font-weight: 900;
  min-width: 22px; height: 22px; padding: 0 6px;
  animation: pulse-badge 2.2s infinite;
}
@keyframes pulse-badge {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220,38,38,.5); }
  50% { transform: scale(1.12); box-shadow: 0 0 0 5px rgba(220,38,38,.0); }
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.session-box {
  padding: 8px 14px; border-radius: 14px;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
}
.session-name { font-weight: 800; color: #fff; font-size: 13px; }
.session-role { font-size: 11px; color: var(--g300); text-transform: capitalize; }

/* ── LAYOUT ── */
.shell { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: calc(100vh - var(--topbar-h)); }
.sidebar {
  background: rgba(255,255,255,.72);
  border-right: 1px solid var(--line); padding: 18px 14px; overflow: auto;
  backdrop-filter: blur(12px);
}
.sidebar .nav-btn {
  display: block; width: 100%; text-align: left;
  border: 1px solid transparent; background: transparent;
  color: var(--g800); padding: 11px 14px; border-radius: 14px;
  font-weight: 800; font-size: 14px; cursor: pointer; margin-bottom: 6px;
  transition: .18s background, .18s color, .18s box-shadow;
}
.sidebar .nav-btn:hover { background: var(--g100); color: var(--g900); }
.sidebar .nav-btn.active {
  background: linear-gradient(180deg, var(--g800), var(--g700));
  color: #fff; box-shadow: 0 6px 16px rgba(20,83,45,.24);
}
.sidebar-block {
  margin-top: 16px; padding: 14px; background: var(--surface);
  border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow);
}
.sidebar-title { font-weight: 900; color: var(--g900); margin-bottom: 10px; font-size: 14px; }
.content { padding: 18px; overflow: auto; }
.tab-section  { display: none; }
.tab-section.active { display: block; }

/* ── BOTONES ── */
.btn {
  border: none; border-radius: 12px; padding: 10px 16px;
  font-weight: 800; cursor: pointer; font-size: 13px;
  transition: .18s transform, .18s box-shadow, .18s opacity;
}
.btn:hover { transform: translateY(-1px); }
.btn.primary {
  background: linear-gradient(180deg, var(--g700), var(--g800));
  color: #fff; box-shadow: 0 8px 18px rgba(20,83,45,.22);
}
.btn.success  { background: linear-gradient(180deg, #15803d, #166534); color: #fff; }
.btn.ghost    { background: #fff; color: var(--g900); border: 1px solid var(--line); }
.btn.dark     { background: #1f2937; color: #fff; }
.btn.danger   { background: #b91c1c; color: #fff; }

/* ── KPI ── */
.grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 18px; }
.card { background: var(--surface); border: 1px solid var(--line); border-radius: 22px; padding: 18px; box-shadow: var(--shadow); }
.kpi-title  { font-weight: 700; color: var(--muted); font-size: 13px; }
.kpi-value  { font-size: 36px; font-weight: 900; color: var(--g900); margin: 6px 0 4px; line-height: 1; }
.kpi-sub    { font-size: 11px; color: var(--muted); }
.kpi-bar-wrap { height: 6px; background: var(--g100); border-radius: 999px; margin-top: 8px; overflow: hidden; }
.kpi-bar     { height: 100%; background: linear-gradient(90deg, var(--g600), var(--g400)); border-radius: 999px; transition: width .6s ease; }

/* ── DASHBOARD ── */
.dashboard-grid { display: grid; grid-template-columns: 1.25fr .9fr; gap: 18px; }
.stack { display: grid; gap: 18px; }
.table-wrap { overflow: auto; }
.table { width: 100%; border-collapse: collapse; }
.table th, .table td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; font-size: 13px; }
.table th { background: var(--g100); color: var(--g900); font-weight: 900; position: sticky; top: 0; z-index: 1; text-align: left; }
.table tr:hover td { background: var(--g50); cursor: pointer; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 800; }
.badge.priority-Crítica  { background: #fee2e2; color: #991b1b; }
.badge.priority-Alta     { background: #ffedd5; color: #9a3412; }
.badge.priority-Media    { background: #dbeafe; color: #1d4ed8; }
.badge.priority-Baja     { background: #e2e8f0; color: #334155; }
.badge.status-Pendiente  { background: #e2e8f0; color: #334155; }
.badge.status-En-curso   { background: #dbeafe; color: #1d4ed8; }
.badge.status-Bloqueada  { background: #fee2e2; color: #991b1b; }
.badge.status-Completada { background: var(--g100); color: #166534; }
.badge.status-Atrasada   { background: #ffe4e6; color: #be123c; }
.badge.status-Cancelada  { background: #f3f4f6; color: #4b5563; }

/* ── TYPE CHIP (colores jerárquicos) ── */
.type-chip { font-weight: 900; }
.type-chip.Tema     { color: var(--g900); font-size: 13px; }
.type-chip.Subtema  { color: var(--g700); }
.type-chip.Actividad{ color: var(--g600); }
.type-chip.Hito     { color: var(--teal); }

/* ── GANTT / CRONOGRAMA ── */
.timeline-shell {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 24px; box-shadow: var(--shadow-lg); overflow: hidden;
}
.timeline-header {
  padding: 16px 20px;
  background: linear-gradient(180deg, var(--g800), var(--g900));
}
.timeline-title    { font-size: 17px; font-weight: 900; color: #fff; }
.timeline-subtitle { font-size: 12px; color: var(--g300); margin-top: 4px; }
.timeline-scroll   { overflow: auto; max-height: 70vh; }
.timeline-grid     { min-width: 1100px; }
.timeline-months, .timeline-days, .timeline-row {
  display: grid; grid-template-columns: var(--timeline-label-width) 1fr;
}
.timeline-months { position: sticky; top: 0; z-index: 4; background: var(--surface); border-bottom: 1px solid var(--line); }
.timeline-days   { position: sticky; top: 36px; z-index: 3; background: var(--surface); border-bottom: 1px solid var(--line); }
.timeline-row:nth-child(odd) { background: var(--bg-2); }

/* Colores jerárquicos de filas */
.timeline-row.row-Tema     { background: #eef8f0; border-left: 4px solid var(--g800); }
.timeline-row.row-Subtema  { background: #f3fbf5; border-left: 3px solid var(--g600); }
.timeline-row.row-Hito     { background: #f0faf9; border-left: 3px solid var(--teal); }

.timeline-label-cell {
  position: sticky; left: 0; z-index: 2; background: inherit;
  border-right: 1px solid var(--line); padding: 10px 14px;
}
.timeline-label { display: flex; flex-direction: column; gap: 3px; }
.timeline-label .title { font-size: 13px; font-weight: 800; }
.timeline-label .meta  { font-size: 11px; color: var(--muted); }

/* Colores jerárquicos etiquetas de fila */
.timeline-label.theme-Tema     .title { color: var(--g900); font-size: 14px; font-weight: 900; }
.timeline-label.theme-Subtema  .title { color: var(--g700); font-weight: 800; }
.timeline-label.theme-Actividad .title{ color: var(--g600); }
.timeline-label.theme-Hito     .title { color: var(--teal); font-style: italic; }

.timeline-cells {
  position: relative; display: grid;
  grid-auto-flow: column; grid-auto-columns: var(--timeline-day-width);
  min-height: 58px;
}
.day-cell, .month-cell {
  border-right: 1px solid #eaf4ec;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--muted); padding: 5px 0;
}
.month-cell { font-weight: 900; background: var(--g800); color: var(--g200); border-right: 1px solid var(--g700); font-size: 12px; }

/* Bloques Gantt */
.timeline-block {
  position: absolute; top: 9px; height: 40px; border-radius: 11px;
  padding: 6px 10px; overflow: hidden;
  box-shadow: 0 4px 14px rgba(15,36,24,.18);
  cursor: pointer; border: 1px solid rgba(255,255,255,.4);
  transition: .15s transform, .15s box-shadow;
}
.timeline-block:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(15,36,24,.26); }
.timeline-block .block-title { font-size: 12px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.timeline-block .block-sub   { font-size: 10px; opacity: .88; margin-top: 2px; }

/* Colores de bloque por tipo (encima de la prioridad cuando es Tema/Hito) */
.timeline-block.type-Tema    { background: linear-gradient(135deg, var(--g900), var(--g800)); color: #fff; height: 44px; top: 7px; }
.timeline-block.type-Subtema { background: linear-gradient(135deg, var(--g700), var(--g600)); color: #fff; }
.timeline-block.type-Hito    { background: linear-gradient(135deg, #0f766e, #0d9488); color: #fff; border-radius: 6px; width: 28px !important; }

.timeline-block.priority-Crítica { background: linear-gradient(135deg, #991b1b, #dc2626); color: #fff; }
.timeline-block.priority-Alta    { background: linear-gradient(135deg, #9a3412, #ea580c); color: #fff; }
.timeline-block.priority-Media   { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: #fff; }
.timeline-block.priority-Baja    { background: linear-gradient(135deg, #3f6212, #65a30d); color: #fff; }
.timeline-block.status-Completada { outline: 2px solid rgba(22,163,74,.7); }
.timeline-block.status-Bloqueada  { outline: 2px solid rgba(185,28,28,.8); filter: saturate(.75); }
.timeline-block.status-Atrasada   { box-shadow: 0 0 0 2px #dc2626, 0 10px 24px rgba(190,24,93,.2); }

/* Panel flotante Gantt (edición en doble clic) */
.gantt-float-panel {
  position: fixed; z-index: 300;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 20px; padding: 18px; box-shadow: var(--shadow-lg);
  width: 380px; max-height: 80vh; overflow-y: auto;
}
.gantt-float-panel .gfp-header {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 14px;
}
.gantt-float-panel .gfp-title { font-weight: 900; color: var(--g900); font-size: 14px; }

/* ── TOOLTIP ENRIQUECIDO ── */
.tooltip {
  position: fixed; max-width: 380px; pointer-events: none;
  background: linear-gradient(160deg, #0f2418, #163c22);
  color: #e2fce8; padding: 14px 16px; border-radius: 16px;
  box-shadow: 0 14px 36px rgba(2,6,23,.35); font-size: 12px; z-index: 250;
  border: 1px solid rgba(74,222,128,.2);
}
.tooltip-title  { font-weight: 900; font-size: 14px; color: #fff; margin-bottom: 8px; }
.tooltip-row    { display: flex; gap: 6px; margin-bottom: 4px; }
.tooltip-label  { color: var(--g300); font-weight: 700; min-width: 80px; }
.tooltip-val    { color: #e2fce8; }
.tooltip-desc   { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(74,222,128,.15); color: var(--g300); font-size: 11px; line-height: 1.5; }
.tooltip-prog-wrap { height: 5px; background: rgba(255,255,255,.1); border-radius: 999px; margin-top: 6px; overflow: hidden; }
.tooltip-prog-bar  { height: 100%; background: linear-gradient(90deg, var(--g400), var(--g500)); border-radius: 999px; }

/* ── CALENDARIO ── */
.calendar-shell { display: grid; grid-template-columns: 1.15fr .9fr; gap: 18px; }
.calendar-month { background: var(--surface); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow); overflow: hidden; }
.calendar-head  { padding: 14px 18px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, var(--g800), var(--g900)); display: flex; align-items: center; justify-content: space-between; }
.calendar-head .timeline-title { color: #fff; }
.calendar-head .timeline-subtitle { color: var(--g300); }
.calendar-grid  { display: grid; grid-template-columns: repeat(7, 1fr); }
.calendar-grid .weekday { background: var(--g100); padding: 10px; text-align: center; font-weight: 900; color: var(--g800); border-right: 1px solid var(--line); font-size: 13px; }
.day-card { min-height: 130px; padding: 8px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); background: #fff; }
.day-card.today { background: var(--g50); box-shadow: inset 0 0 0 2px var(--g400); }
.day-number { font-weight: 900; color: var(--g900); margin-bottom: 6px; font-size: 13px; }
.day-chip {
  display: block; margin-bottom: 4px; padding: 4px 7px;
  border-radius: 8px; font-size: 10px; font-weight: 700;
  color: #fff; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: .15s opacity;
}
.day-chip:hover { opacity: .82; }
.day-chip.type-Tema    { background: var(--g800); }
.day-chip.type-Subtema { background: var(--g600); }
.day-chip.type-Hito    { background: var(--teal); }
.day-chip.priority-Crítica { background: #dc2626; }
.day-chip.priority-Alta    { background: #ea580c; }
.day-chip.priority-Media   { background: var(--g600); }
.day-chip.priority-Baja    { background: #65a30d; }
.agenda-list  { display: grid; gap: 10px; }
.agenda-item  { border: 1px solid var(--line); border-radius: 14px; padding: 12px; background: var(--surface-2); cursor: pointer; transition: .15s background; }
.agenda-item:hover { background: var(--g50); }

/* ── EQUIPO / KANBAN ── */
.team-grid, .files-grid, .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.kanban-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
.kanban-col  { background: var(--surface-2); border: 1px solid var(--line); border-radius: 18px; padding: 12px; }
.kanban-col-title { font-weight: 900; color: var(--g900); font-size: 13px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--line); }
.kanban-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: .15s box-shadow; }
.kanban-card:hover { box-shadow: var(--shadow); }
.kanban-card .k-title { font-weight: 800; font-size: 13px; color: var(--g900); }
.kanban-card .k-meta  { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── ARCHIVOS / ACTIVIDAD ── */
.activity-list, .attachment-list, .comment-list { display: grid; gap: 10px; }
.activity-item, .attachment-item, .comment-item { border: 1px solid var(--line); background: var(--surface-2); border-radius: 14px; padding: 12px; }
.attachment-item a { color: var(--g700); text-decoration: none; font-weight: 800; }
.attachment-item a:hover { text-decoration: underline; }

/* Preview de imagen adjunta */
.upload-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; margin-top: 8px; display: none; }

/* ── FORMULARIOS ── */
.form-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; }
.form-grid.compact { gap: 10px; }
.form-grid label { display: grid; gap: 6px; font-size: 13px; font-weight: 700; color: var(--g900); }
.form-grid input, .form-grid select, .form-grid textarea {
  width: 100%; border: 1px solid var(--line); border-radius: 10px;
  padding: 10px 12px; background: #fff; color: var(--text);
  font: inherit; transition: .18s border-color, .18s box-shadow;
}
.form-grid input:focus, .form-grid select:focus, .form-grid textarea:focus {
  outline: none; border-color: var(--g500);
  box-shadow: 0 0 0 3px rgba(34,197,94,.18);
}
.col-12 { grid-column: span 12; }
.col-9  { grid-column: span 9; }
.col-6  { grid-column: span 6; }
.col-4  { grid-column: span 4; }
.col-3  { grid-column: span 3; }

/* ── MODALES ── */
.modal {
  position: fixed; inset: 0;
  background: rgba(7,14,10,.45); backdrop-filter: blur(4px);
  display: grid; place-items: center; z-index: 120;
}
.modal-card {
  width: min(860px, calc(100vw - 32px)); max-height: calc(100vh - 32px);
  overflow: auto; background: var(--surface);
  border: 1px solid var(--line); border-radius: 26px;
  box-shadow: 0 28px 70px rgba(7,14,10,.28);
}
.modal-card.xl { width: min(1240px, calc(100vw - 32px)); }
.modal-header, .modal-footer {
  padding: 16px 20px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.modal-footer { border-bottom: none; border-top: 1px solid var(--line); }
.modal-body   { padding: 20px; }
.icon-btn { border: none; background: var(--g100); color: var(--g900); width: 36px; height: 36px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 900; }
.detail-side { margin-top: 18px; padding: 16px; border: 1px solid var(--line); border-radius: 18px; background: var(--surface-2); }
.digest-preview { white-space: pre-wrap; background: #071c0e; color: #a7f3c0; border-radius: 14px; padding: 18px; font-family: "Consolas", monospace; font-size: 12px; }

/* ── TOAST Y TOOLTIP ── */
.toast {
  position: fixed; right: 18px; bottom: 18px;
  background: linear-gradient(135deg, var(--g900), var(--g800));
  color: #fff; padding: 14px 18px; border-radius: 16px;
  box-shadow: 0 16px 28px rgba(7,14,10,.3); z-index: 220;
  font-weight: 700; font-size: 13px;
  animation: toast-in .25s ease;
}
@keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── RESPONSIVE ── */
@media (max-width: 1200px) {
