<style>
/* ================================================================
   PARACEL · Gestor Colaborativo v3 — Ultra Premium Edition
   Tipografía: Sora (display) + DM Sans (cuerpo)
   Tema: Deep Forest — verde profundo con acentos dorados
   ================================================================ */
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  /* ── Paleta principal ── */
  --g950: #030d07;
  --g900: #071a0e;
  --g850: #0a2614;
  --g800: #0f3d1d;
  --g750: #145228;
  --g700: #186933;
  --g600: #1d8c42;
  --g500: #22a84f;
  --g400: #34d463;
  --g300: #6ee898;
  --g200: #adf5c4;
  --g100: #d6fadf;
  --g50:  #edfdf2;

  /* ── Acentos ── */
  --gold:       #c9952a;
  --gold-light: #f5c842;
  --teal:       #0a9688;
  --teal-light: #14b8a6;
  --red:        #c0392b;
  --red-light:  #ef4444;
  --amber:      #d97706;
  --blue:       #1e40af;
  --blue-light: #3b82f6;
  --violet:     #6d28d9;

  /* ── Superficies ── */
  --bg:          #f4faf6;
  --bg-2:        #ecf7f0;
  --surface:     rgba(255,255,255,0.92);
  --surface-2:   rgba(255,255,255,0.6);
  --surface-3:   rgba(255,255,255,0.35);
  --border:      rgba(15,61,29,0.1);
  --border-2:    rgba(15,61,29,0.06);
  --glass:       rgba(255,255,255,0.72);
  --glass-border:rgba(255,255,255,0.85);

  /* ── Texto ── */
  --text:        #071a0e;
  --text-2:      #1a4028;
  --muted:       #4d7060;
  --muted-2:     #7a9a86;

  /* ── Sombras ── */
  --shadow-xs:   0 1px 4px rgba(10,38,20,.06);
  --shadow-sm:   0 4px 16px rgba(10,38,20,.08);
  --shadow:      0 8px 32px rgba(10,38,20,.10);
  --shadow-md:   0 14px 40px rgba(10,38,20,.12);
  --shadow-lg:   0 24px 60px rgba(10,38,20,.16);
  --shadow-glow: 0 0 0 3px rgba(34,168,79,.25);

  /* ── Layout ── */
  --topbar-h:    72px;
  --sidebar-w:   280px;
  --radius-sm:   10px;
  --radius:      16px;
  --radius-lg:   24px;
  --radius-xl:   32px;

  /* ── Timeline ── */
  --tl-label-w:  340px;
  --tl-day-w:    26px;

  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Dark mode ── */
.dark {
  --bg:          #030d07;
  --bg-2:        #071a0e;
  --surface:     rgba(10,38,20,0.92);
  --surface-2:   rgba(10,38,20,0.6);
  --surface-3:   rgba(15,55,30,0.35);
  --border:      rgba(52,212,99,0.12);
  --border-2:    rgba(52,212,99,0.06);
  --glass:       rgba(10,38,20,0.72);
  --glass-border:rgba(52,212,99,0.15);
  --text:        #d6fadf;
  --text-2:      #adf5c4;
  --muted:       #7aaa8a;
  --muted-2:     #4d7060;
  --shadow:      0 8px 32px rgba(0,0,0,.4);
  --shadow-lg:   0 24px 60px rgba(0,0,0,.5);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); }
.hidden { display: none !important; }
.muted  { color: var(--muted); }
.small  { font-size: 12px; }
.wide   { width: 100%; }
button  { font-family: inherit; }
a       { color: var(--g600); text-decoration: none; }
a:hover { text-decoration: underline; }
input, select, textarea { font-family: inherit; font-size: 13.5px; }

/* ── Background ── */
body {
  background:
    radial-gradient(ellipse 80% 50% at 100% -5%, rgba(34,168,79,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at -10% 90%, rgba(10,150,136,.10) 0%, transparent 55%),
    linear-gradient(165deg, var(--g50) 0%, #e5f5ea 40%, var(--bg) 100%);
  background-attachment: fixed;
}
.dark body, .dark {
  background:
    radial-gradient(ellipse 80% 50% at 100% -5%, rgba(34,168,79,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at -10% 90%, rgba(10,150,136,.08) 0%, transparent 55%),
    linear-gradient(165deg, #040e08 0%, #061509 40%, #030d07 100%);
}

/* ═══════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════ */
.screen { min-height: 100vh; }

.login-screen {
  display: grid; place-items: center; padding: 24px;
  min-height: 100vh;
  background:
    radial-gradient(ellipse 70% 60% at 80% 10%, rgba(34,168,79,.18) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 10% 85%, rgba(10,150,136,.14) 0%, transparent 50%),
    linear-gradient(160deg, #f0fdf5, #e5f4ea 50%, #edfdf2);
}
.dark .login-screen {
  background:
    radial-gradient(ellipse 70% 60% at 80% 10%, rgba(34,168,79,.15) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 10% 85%, rgba(10,150,136,.10) 0%, transparent 50%),
    linear-gradient(160deg, #061509, #04100a);
}

.login-card {
  width: min(480px, 100%);
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: 40px;
  box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.8);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  animation: loginIn .6s cubic-bezier(.16,1,.3,1);
}
@keyframes loginIn {
  from { opacity: 0; transform: translateY(24px) scale(.97); }
  to   { opacity: 1; transform: none; }
}

.brand-mark {
  width: 64px; height: 64px; border-radius: 20px;
  display: grid; place-items: center;
  background: linear-gradient(145deg, var(--g700) 0%, var(--g400) 100%);
  color: #fff; font-size: 30px; font-weight: 900;
  font-family: 'Sora', sans-serif;
  box-shadow: 0 12px 28px rgba(29,140,66,.35), inset 0 1px 0 rgba(255,255,255,.25);
  position: relative; overflow: hidden;
}
.brand-mark::after {
  content:''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.2) 0%, transparent 60%);
}
.brand-mark.sm { width: 44px; height: 44px; border-radius: 14px; font-size: 20px; }

.login-card h1 {
  font-family: 'Sora', sans-serif;
  font-size: 24px; font-weight: 800;
  color: var(--text); margin: 20px 0 6px;
  letter-spacing: -.5px; line-height: 1.2;
}
.login-card .sub { color: var(--muted); font-size: 13.5px; margin-bottom: 28px; }

.login-help {
  margin-top: 20px; padding: 14px 16px; border-radius: var(--radius);
  background: rgba(29,140,66,.06); border: 1px solid rgba(29,140,66,.14);
  color: var(--muted); font-size: 12.5px; font-family: 'DM Mono', monospace;
}
.error-box {
  margin-top: 14px; padding: 12px 16px; border-radius: var(--radius-sm);
  background: rgba(192,57,43,.08); border: 1px solid rgba(192,57,43,.22);
  color: var(--red); font-size: 13px;
}

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar {
  height: var(--topbar-h);
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 16px; align-items: center;
  padding: 0 20px 0 16px;
  background: linear-gradient(135deg, var(--g800) 0%, var(--g950) 100%);
  border-radius: var(--radius-lg);
  margin: 12px 12px 0;
  box-shadow: 0 12px 36px rgba(7,26,14,.30), inset 0 1px 0 rgba(255,255,255,.06);
  position: relative; overflow: hidden; z-index: 10;
}
.topbar::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(90deg, rgba(34,168,79,.06) 0%, transparent 40%);
  pointer-events:none;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.app-title {
  font-family: 'Sora', sans-serif;
  font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px;
}
.app-subtitle { font-size: 11px; color: var(--g300); margin-top: 2px; opacity: .8; }

.message-bar {
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.10);
  color: #c8f0d4; padding: 8px 14px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500;
  display: flex; align-items: center; gap: 8px; min-width: 0;
}
.urgent-badge {
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--red-light); color: #fff;
  border-radius: 999px; font-size: 11px; font-weight: 800;
  min-width: 20px; height: 20px; padding: 0 5px;
  animation: pulse-badge 2.4s infinite;
}
@keyframes pulse-badge {
  0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
  50% { transform: scale(1.1); box-shadow: 0 0 0 4px rgba(239,68,68,0); }
}
.topbar-right { display: flex; align-items: center; gap: 8px; }
.session-box {
  padding: 7px 12px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.10);
}
.session-name { font-weight: 700; color: #fff; font-size: 13px; font-family: 'Sora',sans-serif; }
.session-role { font-size: 11px; color: var(--g300); text-transform: capitalize; }

/* ── Modo oscuro toggle ── */
#dark-toggle {
  width: 34px; height: 34px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.07); color: #fff;
  cursor: pointer; display: grid; place-items: center; font-size: 16px;
  transition: all .2s;
}
#dark-toggle:hover { background: rgba(255,255,255,.14); transform: scale(1.05); }

/* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
.shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  gap: 0; padding: 12px; min-height: calc(100vh - var(--topbar-h) - 24px);
  align-items: start;
}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar {
  position: sticky; top: 12px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  padding: 16px 12px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.nav-section { margin-bottom: 6px; }
.nav-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted-2); padding: 6px 10px 4px;
}
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; text-align: left;
  border: 1px solid transparent; background: transparent;
  color: var(--text-2); padding: 10px 12px; border-radius: var(--radius);
  font-weight: 600; font-size: 13.5px; cursor: pointer; margin-bottom: 2px;
  transition: all .2s cubic-bezier(.175,.885,.32,1.275);
}
.nav-btn .nav-icon { font-size: 16px; flex-shrink: 0; }
.nav-btn:hover {
  background: rgba(29,140,66,.08);
  color: var(--g700); transform: translateX(3px);
}
.nav-btn.active {
  background: linear-gradient(135deg, var(--g700), var(--g800));
  color: #fff;
  box-shadow: 0 6px 20px rgba(20,82,40,.28), inset 0 1px 0 rgba(255,255,255,.12);
  transform: translateX(2px);
  border-color: transparent;
}
.nav-divider { height: 1px; background: var(--border); margin: 10px 8px; }

.sidebar-block {
  margin-top: 12px; padding: 14px;
  background: var(--surface-3);
  border: 1px solid var(--border-2); border-radius: var(--radius);
}
.sidebar-title {
  font-family: 'Sora', sans-serif;
  font-weight: 700; color: var(--text); margin-bottom: 10px; font-size: 13px;
}

/* ═══════════════════════════════════════════
   CONTENT AREA
═══════════════════════════════════════════ */
.content { padding: 0 0 0 14px; overflow: hidden; }
.tab-section { display: none; animation: fadeTab .35s ease; }
.tab-section.active { display: block; }
@keyframes fadeTab {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn {
  border: none; border-radius: var(--radius); padding: 10px 18px;
  font-weight: 700; cursor: pointer; font-size: 13px; font-family: inherit;
  transition: all .18s cubic-bezier(.175,.885,.32,1.275);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn.primary {
  background: linear-gradient(135deg, var(--g600) 0%, var(--g800) 100%);
  color: #fff;
  box-shadow: 0 6px 20px rgba(29,140,66,.32), inset 0 1px 0 rgba(255,255,255,.15);
}
.btn.primary:hover { box-shadow: 0 10px 28px rgba(29,140,66,.40); }
.btn.success  { background: linear-gradient(135deg, var(--teal), #0a7b70); color: #fff; box-shadow: 0 6px 18px rgba(10,150,136,.28); }
.btn.ghost    { background: var(--surface); color: var(--text-2); border: 1px solid var(--border); box-shadow: var(--shadow-xs); }
.btn.dark     { background: var(--g850); color: #fff; }
.btn.danger   { background: linear-gradient(135deg, #c0392b, #8b0000); color: #fff; }
.btn.gold     { background: linear-gradient(135deg, var(--gold), #a07020); color: #fff; box-shadow: 0 6px 18px rgba(201,149,42,.28); }
.btn.sm { padding: 7px 12px; font-size: 12px; border-radius: var(--radius-sm); }
.btn.wide { width: 100%; justify-content: center; }
.btn.icon { width: 36px; height: 36px; padding: 0; justify-content: center; font-size: 16px; }

/* ═══════════════════════════════════════════
   FORMS
═══════════════════════════════════════════ */
.form-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; }
.col-2  { grid-column: span 2; }
.col-3  { grid-column: span 3; }
.col-4  { grid-column: span 4; }
.col-6  { grid-column: span 6; }
.col-8  { grid-column: span 8; }
.col-9  { grid-column: span 9; }
.col-12 { grid-column: span 12; }
label span { display: block; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 5px; }
input[type=text], input[type=password], input[type=email], input[type=url],
input[type=number], input[type=date], input[type=color], select, textarea {
  width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text); transition: border-color .15s, box-shadow .15s;
  outline: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--g500);
  box-shadow: var(--shadow-glow);
}
input[type=color] { height: 40px; padding: 3px 6px; cursor: pointer; }
textarea { resize: vertical; min-height: 80px; }
.upload-preview {
  display: none; margin-top: 10px; max-width: 100%; max-height: 180px;
  border-radius: var(--radius); border: 1px solid var(--border);
  object-fit: contain;
}

/* ═══════════════════════════════════════════
   CARDS
═══════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .25s, transform .25s;
}
.card:hover { box-shadow: var(--shadow); }
.card-title {
  font-family: 'Sora', sans-serif;
  font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -.2px;
}
.card-sub { font-size: 12px; color: var(--muted); margin-top: 3px; margin-bottom: 16px; }

/* ═══════════════════════════════════════════
   KPI CARDS
═══════════════════════════════════════════ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
  gap: 14px; margin-bottom: 20px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px;
  box-shadow: var(--shadow-sm);
  transition: all .25s cubic-bezier(.175,.885,.32,1.275);
  position: relative; overflow: hidden;
}
.kpi-card::before {
  content:''; position:absolute; right:-16px; top:-16px;
  width: 80px; height: 80px; border-radius: 50%;
  background: radial-gradient(var(--kpi-accent, rgba(34,168,79,.08)), transparent);
}
.kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.kpi-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: var(--muted);
}
.kpi-val {
  font-family: 'Sora', sans-serif;
  font-size: 36px; font-weight: 900; color: var(--text);
  margin: 6px 0 4px; line-height: 1; letter-spacing: -1.5px;
}
.kpi-sub { font-size: 11.5px; color: var(--muted); }
.kpi-bar { height: 4px; background: var(--border-2); border-radius: 99px; margin-top: 12px; overflow: hidden; }
.kpi-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--g600), var(--g300));
  border-radius: 99px;
  transition: width 1.2s cubic-bezier(.175,.885,.32,1.275);
}
.kpi-card.danger .kpi-fill { background: linear-gradient(90deg, var(--red), #f87171); }
.kpi-card.amber .kpi-fill  { background: linear-gradient(90deg, var(--amber), #fbbf24); }
.kpi-card.teal .kpi-fill   { background: linear-gradient(90deg, var(--teal), var(--teal-light)); }
.kpi-card.gold .kpi-fill   { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }

/* ── Progress ring ── */
.kpi-ring { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); }
.ring-svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
.ring-fg { fill: none; stroke-width: 3; stroke-linecap: round;
  stroke: var(--g500); transition: stroke-dashoffset 1.2s cubic-bezier(.175,.885,.32,1.275); }

/* ═══════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════ */
.dash-grid { display: grid; grid-template-columns: 1.3fr .9fr; gap: 16px; }
.stack { display: grid; gap: 14px; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title {
  font-family: 'Sora', sans-serif;
  font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -.2px;
}
.section-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

/* ═══════════════════════════════════════════
   TABLA
═══════════════════════════════════════════ */
.table-wrap {
  overflow: auto; background: var(--surface-2);
  border-radius: var(--radius); border: 1px solid var(--border);
}
.table { width: 100%; border-collapse: collapse; }
.table th, .table td { padding: 11px 14px; border-bottom: 1px solid var(--border-2); vertical-align: middle; font-size: 13px; }
.table th {
  background: rgba(29,140,66,.05); color: var(--muted); font-weight: 700;
  position: sticky; top: 0; z-index: 1; text-align: left;
  text-transform: uppercase; letter-spacing: .5px; font-size: 10.5px;
}
.table tr { transition: background .15s; cursor: pointer; }
.table tr:hover td { background: rgba(29,140,66,.04); }
.table tr:last-child td { border-bottom: none; }

/* ═══════════════════════════════════════════
   BADGES & CHIPS
═══════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 700; letter-spacing: .2px;
  white-space: nowrap;
}
.badge.priority-Crítica  { background: rgba(192,57,43,.1); color: #9b2214; }
.badge.priority-Alta     { background: rgba(217,119,6,.1);  color: #92400e; }
.badge.priority-Media    { background: rgba(30,64,175,.1);  color: #1e40af; }
.badge.priority-Baja     { background: rgba(107,114,128,.1);color: #4b5563; }
.badge.status-Pendiente  { background: rgba(107,114,128,.1);color: #374151; }
.badge.status-En-curso   { background: rgba(30,64,175,.1);  color: #1e40af; }
.badge.status-Bloqueada  { background: rgba(192,57,43,.1);  color: #9b2214; }
.badge.status-Completada { background: rgba(29,140,66,.1);  color: #15693a; }
.badge.status-Atrasada   { background: rgba(190,18,60,.1);  color: #9b1239; }
.badge.status-Cancelada  { background: rgba(107,114,128,.08);color:#6b7280; }

.type-chip { font-weight: 800; font-size: 12px; }
.type-chip.Tema      { color: var(--g850); font-size: 13px; }
.type-chip.Subtema   { color: var(--g700); }
.type-chip.Actividad { color: var(--g600); }
.type-chip.Hito      { color: var(--teal); font-style: italic; }

/* ═══════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════ */
.prog-wrap { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
.prog-fill.green  { background: linear-gradient(90deg, var(--g600), var(--g400)); }
.prog-fill.red    { background: linear-gradient(90deg, var(--red), #f87171); }
.prog-fill.amber  { background: linear-gradient(90deg, var(--amber), #fbbf24); }
.prog-fill.blue   { background: linear-gradient(90deg, var(--blue), var(--blue-light)); }
.prog-fill.teal   { background: linear-gradient(90deg, var(--teal), var(--teal-light)); }

/* ═══════════════════════════════════════════
   GANTT / CRONOGRAMA
═══════════════════════════════════════════ */
.timeline-shell {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow);
  overflow: hidden;
}
.timeline-header {
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--g800) 0%, var(--g950) 100%);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.timeline-header .card-title { color: #fff; }
.timeline-header .card-sub   { color: var(--g300); margin-bottom: 0; }
.timeline-toolbar {
  display: flex; gap: 8px; align-items: center; margin-top: 12px;
}
.timeline-scroll { overflow: auto; max-height: 68vh; }
.timeline-grid { min-width: 1000px; }

.tl-months, .tl-days, .tl-row {
  display: grid; grid-template-columns: var(--tl-label-w) 1fr;
}
.tl-months { position: sticky; top: 0; z-index: 4; background: var(--surface); border-bottom: 1px solid var(--border); }
.tl-days   { position: sticky; top: 33px; z-index: 3; background: var(--surface); border-bottom: 1px solid var(--border); }

.tl-row.row-Tema     { background: rgba(14,61,28,.04); border-left: 3px solid var(--g800); }
.tl-row.row-Subtema  { background: rgba(29,140,66,.03); border-left: 2px solid var(--g600); }
.tl-row.row-Hito     { background: rgba(10,150,136,.03); border-left: 2px solid var(--teal); }
.tl-row:nth-child(even) { background-color: rgba(0,0,0,.015); }

.tl-label-cell {
  position: sticky; left: 0; z-index: 2; background: inherit;
  border-right: 1px solid var(--border); padding: 8px 12px;
}
.tl-label { display: flex; flex-direction: column; gap: 2px; }
.tl-title  { font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; }
.tl-title:hover { color: var(--g600); text-decoration: underline; }
.tl-meta   { font-size: 11px; color: var(--muted); }

.tl-label.theme-Tema    .tl-title { color: var(--g850); font-size: 13.5px; font-weight: 800; }
.tl-label.theme-Subtema .tl-title { color: var(--g700); font-weight: 700; }
.tl-label.theme-Hito    .tl-title { color: var(--teal); font-style: italic; }

.tl-cells {
  position: relative;
  display: flex; flex-direction: row;
  min-height: 54px; overflow: visible;
}
.day-cell {
  flex: 0 0 var(--tl-day-w); width: var(--tl-day-w);
  border-right: 1px solid rgba(0,0,0,.04);
  display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; color: var(--muted-2); padding: 4px 0;
}
.month-cell {
  flex: none;
  font-weight: 800; font-size: 11px;
  background: var(--g800); color: var(--g200);
  border-right: 1px solid var(--g700);
  display: flex; align-items: center; justify-content: center;
  padding: 5px 4px;
}
.day-cell.today-col { background: rgba(29,140,66,.08); border-right-color: var(--g500); }

/* Gantt blocks */
.tl-block {
  position: absolute; top: 7px; height: 38px; border-radius: var(--radius-sm);
  padding: 5px 9px; overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.18);
  cursor: pointer; border: 1px solid rgba(255,255,255,.25);
  transition: transform .15s, box-shadow .15s;
}
.tl-block:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.22); }
.tl-block .b-title { font-size: 11.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-block .b-sub   { font-size: 10px; opacity: .85; margin-top: 1px; }

.tl-block.type-Tema    { background: linear-gradient(135deg, var(--g900), var(--g700)); color: #fff; height: 42px; top: 5px; }
.tl-block.type-Subtema { background: linear-gradient(135deg, var(--g700), var(--g500)); color: #fff; }
.tl-block.type-Hito    { background: linear-gradient(135deg, var(--teal), var(--teal-light)); color: #fff; border-radius: 6px; }
.tl-block.priority-Crítica { background: linear-gradient(135deg, #9b1c1c, #dc2626); color: #fff; }
.tl-block.priority-Alta    { background: linear-gradient(135deg, #92400e, #d97706); color: #fff; }
.tl-block.priority-Media   { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: #fff; }
.tl-block.priority-Baja    { background: linear-gradient(135deg, #3f5f14, #65a30d); color: #fff; }
.tl-block.status-Completada { outline: 2px solid rgba(34,168,79,.6); outline-offset: 1px; }

/* Today line */
.today-line {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: var(--g400); z-index: 5; pointer-events: none;
}
.today-line::before {
  content: '▼'; position: absolute; top: -6px; left: -5px;
  color: var(--g400); font-size: 10px;
}

/* ═══════════════════════════════════════════
   CALENDARIO
═══════════════════════════════════════════ */
.calendar-shell { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }
.cal-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
}
.cal-title { font-family: 'Sora',sans-serif; font-weight: 800; font-size: 15px; color: var(--text); text-transform: capitalize; }
.cal-nav   { display: flex; gap: 6px; align-items: center; }

.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.weekday {
  text-align: center; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px;
  color: var(--muted-2); padding: 6px 0;
}
.day-card {
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  padding: 6px 7px; min-height: 80px;
  transition: all .2s;
}
.day-card:hover { background: var(--surface); border-color: var(--border); }
.day-card.today {
  background: linear-gradient(135deg, rgba(29,140,66,.08), rgba(29,140,66,.04));
  border-color: var(--g500);
  box-shadow: 0 0 0 2px rgba(29,140,66,.15);
}
.day-num {
  font-weight: 700; font-size: 13px; color: var(--muted);
  margin-bottom: 4px; font-family: 'DM Mono', monospace;
}
.day-card.today .day-num {
  color: #fff; background: var(--g600);
  width: 22px; height: 22px; border-radius: 50%;
  display: grid; place-items: center;
  font-size: 12px; margin-bottom: 5px;
}

.agenda-list { display: grid; gap: 8px; }
.agenda-item {
  padding: 11px 13px; border-radius: var(--radius);
  background: var(--surface-2); border: 1px solid var(--border-2);
  cursor: pointer; transition: all .15s;
}
.agenda-item:hover { background: var(--surface); border-color: var(--border); }

/* ═══════════════════════════════════════════
   KANBAN
═══════════════════════════════════════════ */
.kanban-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
.kanban-col {
  background: var(--bg-2); border-radius: var(--radius); padding: 12px;
  border: 1px solid var(--border-2);
}
.kanban-col-title {
  font-weight: 800; font-size: 13px; margin-bottom: 10px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
  color: var(--text);
}
.kanban-card {
  background: var(--surface); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 10px 12px;
  margin-bottom: 8px; cursor: pointer;
  box-shadow: var(--shadow-xs);
  transition: all .18s;
}
.kanban-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); border-color: var(--g300); }
.k-title { font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 3px; }
.k-meta  { font-size: 11.5px; color: var(--muted); }

/* ═══════════════════════════════════════════
   EQUIPOS & ARCHIVOS
═══════════════════════════════════════════ */
.team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.files-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.activity-list { display: grid; gap: 8px; max-height: 400px; overflow-y: auto; }
.activity-item {
  padding: 12px 14px; border-radius: var(--radius);
  background: var(--surface-2); border: 1px solid var(--border-2);
  transition: background .15s;
}
.activity-item:hover { background: var(--surface); }

.attachment-list { display: grid; gap: 8px; max-height: 350px; overflow-y: auto; }
.attachment-item {
  padding: 10px 12px; border-radius: var(--radius);
  background: var(--surface-2); border: 1px solid var(--border-2);
}
.comment-list { display: grid; gap: 8px; max-height: 350px; overflow-y: auto; }
.comment-item {
  padding: 10px 12px; border-radius: var(--radius);
  background: var(--surface-2); border: 1px solid var(--border-2);
}

/* ═══════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════ */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.modal {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(7,26,14,.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: grid; place-items: center; padding: 20px;
  animation: overlayIn .2s ease;
}
@keyframes overlayIn { from { opacity:0; } to { opacity:1; } }
.modal-card {
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 620px; max-height: 90vh; overflow: hidden;
  display: flex; flex-direction: column;
  animation: modalIn .28s cubic-bezier(.16,1,.3,1);
}
.modal-card.xl { max-width: 900px; }
@keyframes modalIn {
  from { transform: translateY(20px) scale(.97); opacity: 0; }
  to   { transform: none; opacity: 1; }
}
.modal-header {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  background: linear-gradient(135deg, rgba(29,140,66,.04), transparent);
}
.modal-header h2 {
  font-family: 'Sora', sans-serif;
  font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px;
}
.modal-header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 16px 24px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: flex-end; gap: 8px;
}
.detail-side {
  margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);
}
.icon-btn {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface-2);
  cursor: pointer; font-size: 16px; color: var(--muted); flex-shrink: 0;
  display: grid; place-items: center; transition: all .15s;
}
.icon-btn:hover { background: rgba(192,57,43,.1); color: var(--red); }

/* ═══════════════════════════════════════════
   GANTT FLOAT PANEL
═══════════════════════════════════════════ */
.gantt-float-panel {
  position: fixed; z-index: 90; width: 380px;
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  animation: modalIn .2s cubic-bezier(.16,1,.3,1);
}
.gfp-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(135deg, var(--g800), var(--g950));
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.gfp-title { font-family: 'Sora',sans-serif; font-weight: 800; font-size: 14px; color: #fff; }
.gfp-body  { padding: 16px; }

/* ═══════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════ */
.tooltip {
  position: fixed; z-index: 200;
  background: var(--g850); color: #d6fae0;
  border: 1px solid rgba(52,212,99,.2);
  border-radius: var(--radius-lg);
  padding: 14px 16px; width: 300px;
  box-shadow: 0 20px 50px rgba(0,0,0,.35);
  pointer-events: none;
  font-size: 12.5px; line-height: 1.55;
}
.tooltip-title {
  font-family: 'Sora',sans-serif;
  font-weight: 800; font-size: 14px; color: #fff;
  margin-bottom: 10px; line-height: 1.3;
}
.tooltip-row { display: flex; gap: 6px; margin-bottom: 4px; }
.tooltip-label { color: var(--g300); font-weight: 600; min-width: 80px; flex-shrink: 0; }
.tooltip-val { color: #d6fae0; }
.tooltip-prog { height: 5px; background: rgba(255,255,255,.1); border-radius: 99px; overflow: hidden; margin: 8px 0; }
.tooltip-prog-fill { height: 100%; background: linear-gradient(90deg, var(--g400), var(--g300)); border-radius: 99px; }
.tooltip-desc { margin-top: 8px; color: var(--g300); font-size: 11.5px; border-top: 1px solid rgba(255,255,255,.07); padding-top: 8px; }

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 300;
  padding: 12px 20px; border-radius: var(--radius);
  font-weight: 700; font-size: 13.5px;
  box-shadow: var(--shadow-lg);
  animation: toastIn .3s cubic-bezier(.16,1,.3,1);
  max-width: 380px;
}
.toast.ok  { background: var(--g800); color: #d6fae0; }
.toast.err { background: #7f1d1d; color: #fee2e2; }
@keyframes toastIn {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: none; opacity: 1; }
}

/* ═══════════════════════════════════════════
   DIGEST PREVIEW
═══════════════════════════════════════════ */
.digest-preview {
  font-family: 'DM Mono', monospace; font-size: 12.5px;
  white-space: pre-wrap; color: var(--text); line-height: 1.7;
  background: var(--bg-2); padding: 16px; border-radius: var(--radius);
  border: 1px solid var(--border); max-height: 500px; overflow: auto;
}

/* ═══════════════════════════════════════════
   ACTIVITY LOG
═══════════════════════════════════════════ */
.log-item {
  display: grid; grid-template-columns: 28px 1fr; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border-2);
  align-items: start;
}
.log-dot {
  width: 28px; height: 28px; border-radius: 50%;
  display: grid; place-items: center; font-size: 13px;
  flex-shrink: 0; margin-top: 2px;
}
.log-dot.create { background: rgba(29,140,66,.1); }
.log-dot.update { background: rgba(30,64,175,.1); }
.log-dot.delete { background: rgba(192,57,43,.1); }
.log-dot.auth   { background: rgba(201,149,42,.1); }
.log-text  { font-size: 13px; color: var(--text); }
.log-meta  { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono',monospace; }

/* ═══════════════════════════════════════════
   SCROLLBARS
═══════════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--g300); }

/* ═══════════════════════════════════════════
   RESPONSIVE ADJUSTMENTS
═══════════════════════════════════════════ */
@media (max-width: 900px) {
  :root { --sidebar-w: 220px; }
  .dash-grid { grid-template-columns: 1fr; }
  .calendar-shell, .team-grid, .files-grid, .settings-grid { grid-template-columns: 1fr; }
}
@media (max-width: 680px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .content { padding: 0; }
}

/* ═══════════════════════════════════════════
   COMPACT TIMELINE TOGGLE
═══════════════════════════════════════════ */
.tl-row.compact .tl-cells { min-height: 34px; }
.tl-row.compact .tl-block { top: 4px; height: 26px; }
.tl-row.compact .tl-block.type-Tema { top: 3px; height: 28px; }
.tl-row.compact .tl-block .b-sub { display: none; }

/* ═══════════════════════════════════════════
   SEARCH BAR
═══════════════════════════════════════════ */
.search-wrap { position: relative; }
.search-wrap input { padding-left: 34px; }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--muted-2); pointer-events: none; font-size: 14px;
}

/* ═══════════════════════════════════════════
   STAT MINI CHARTS (sparkline-like)
═══════════════════════════════════════════ */
.mini-chart { height: 36px; width: 100%; margin-top: 10px; }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--muted);
}
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: .4; }
.empty-text { font-size: 14px; }

/* ── Loader skeleton ── */
.skeleton {
  background: linear-gradient(90deg, var(--border-2) 25%, rgba(29,140,66,.04) 50%, var(--border-2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* ── Chip tag ── */
.tag {
  display: inline-flex; padding: 2px 7px; border-radius: 6px;
  background: rgba(29,140,66,.08); color: var(--g700);
  font-size: 11px; font-weight: 600; margin: 1px;
}

/* ═══════════════════════════════════════
   CALENDAR: PROJECT LEGEND PILLS
═══════════════════════════════════════ */
.proj-legend {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.proj-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 999px;
  border: 1.5px solid; font-size: 11.5px; font-weight: 700;
  cursor: pointer; transition: all .15s; background: var(--surface);
  user-select: none;
}
.proj-pill:hover { opacity: .8; transform: scale(1.04); }
.proj-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.proj-pct { font-weight: 500; opacity: .7; }

.day-chip {
  display: block; font-size: 10px; font-weight: 500;
  padding: 1px 4px; border-radius: 4px; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; transition: opacity .15s, transform .1s;
}
.day-chip:hover { opacity: 1; transform: scale(1.02); }

/* ═══════════════════════════════════════
   MINI-GANTT (calendario sidebar)
═══════════════════════════════════════ */
.mini-gantt-wrap { overflow-x: auto; }
.mg-header, .mg-proj-row {
  display: grid; grid-template-columns: 100px 1fr;
  align-items: center; gap: 0;
}
.mg-header { margin-bottom: 4px; }
.mg-label {
  font-size: 11.5px; font-weight: 700; color: var(--text-2);
  padding: 4px 8px 4px 10px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; display: flex; justify-content: space-between;
  align-items: center; gap: 4px;
}
.mg-pct { font-size: 10px; color: var(--muted); font-weight: 500; }
.mg-days {
  display: flex; position: relative; overflow: hidden;
}
.mg-day {
  flex: 1; text-align: center; font-size: 9px; color: var(--muted-2);
  font-family: 'DM Mono', monospace; padding: 2px 0;
  border-right: 1px solid var(--border-2);
}
.mg-day.mg-today {
  background: rgba(29,140,66,.12); color: var(--g600); font-weight: 800;
}
.mg-proj-row { margin-bottom: 4px; }
.mg-day-cell {
  flex: 1; height: 20px; border-right: 1px solid var(--border-2);
}
.mg-block {
  position: absolute; top: 2px; height: 16px;
  border-radius: 4px; cursor: pointer;
  transition: opacity .15s;
  z-index: 2;
}
.mg-block:hover { opacity: 1 !important; outline: 1.5px solid rgba(0,0,0,.25); }
.mg-today-line {
  position: absolute; top: 0; bottom: 0; width: 1.5px;
  background: var(--g500); z-index: 3; pointer-events: none;
}

/* ═══════════════════════════════════════
   TEAM PHOTOS
═══════════════════════════════════════ */
.team-photos-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 14px; margin-top: 4px;
}
.team-photo-card {
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 14px 10px; text-align: center;
  background: var(--surface-2);
  transition: box-shadow .2s;
}
.team-photo-card:hover { box-shadow: var(--shadow-sm); }
.photo-avatar {
  width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 8px;
  background: linear-gradient(135deg, var(--g700), var(--g400));
  color: #fff; font-size: 26px; font-weight: 900;
  display: grid; place-items: center;
  font-family: 'Sora', sans-serif;
  border: 2px solid var(--border);
}
.photo-name { font-weight: 700; font-size: 12.5px; color: var(--text); }
